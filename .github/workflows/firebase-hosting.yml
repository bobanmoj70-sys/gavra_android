name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'firebase.json'
      - '.firebaserc'
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Ovo koristi zvaničnu Firebase akciju
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          # BITNO: Nedostaje ova tajna na GitHubu (FIREBASE_SERVICE_ACCOUNT_GAVRA_NOTIF_20250920162521)
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAVRA_NOTIF_20250920162521 }}'
          channelId: live
          projectId: gavra-notif-20250920162521
