name: 🚀 Unified Mobile Release

on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Auto-bump patch+build from pubspec.yaml?'
        required: false
        default: true
        type: boolean
      version_name:
        description: 'Force version name (e.g. 6.0.120). Leave empty to auto/current.'
        required: false
        default: ''
        type: string
      version_code:
        description: 'Force version code (e.g. 120). Leave empty to auto/current.'
        required: false
        default: ''
        type: string
      release_notes:
        description: 'iOS release notes (optional)'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  prepare-version:
    name: 🧮 Prepare shared version
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.version.outputs.VERSION_NAME }}
      version_code: ${{ steps.version.outputs.VERSION_CODE }}
      target_ref: ${{ steps.version.outputs.TARGET_REF }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Resolve version
        id: version
        shell: bash
        run: |
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          CUR_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          CUR_CODE=$(echo "$CURRENT" | cut -d'+' -f2)

          INPUT_NAME='${{ inputs.version_name }}'
          INPUT_CODE='${{ inputs.version_code }}'
          SHOULD_BUMP='${{ inputs.bump_version }}'

          if [ -z "$SHOULD_BUMP" ]; then
            SHOULD_BUMP='true'
          fi

          if [ -n "$INPUT_NAME" ] && [ -n "$INPUT_CODE" ]; then
            VER_NAME="$INPUT_NAME"
            VER_CODE="$INPUT_CODE"
          elif [ "$SHOULD_BUMP" = 'true' ]; then
            MAJOR=$(echo "$CUR_NAME" | cut -d'.' -f1)
            MINOR=$(echo "$CUR_NAME" | cut -d'.' -f2)
            PATCH=$(echo "$CUR_NAME" | cut -d'.' -f3)
            VER_NAME="$MAJOR.$MINOR.$((PATCH + 1))"
            VER_CODE="$((CUR_CODE + 1))"
          else
            VER_NAME="$CUR_NAME"
            VER_CODE="$CUR_CODE"
          fi

          NEW_VERSION="$VER_NAME+$VER_CODE"
          echo "[INFO] Unified version: $CURRENT -> $NEW_VERSION"

          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml

          if git diff --staged --quiet; then
            echo "[INFO] pubspec already on target version."
          else
            git commit -m "chore: set unified mobile version to $NEW_VERSION [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi

          TARGET_REF=$(git rev-parse HEAD)
          echo "VERSION_NAME=$VER_NAME" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VER_CODE" >> "$GITHUB_OUTPUT"
          echo "TARGET_REF=$TARGET_REF" >> "$GITHUB_OUTPUT"

  release-google:
    name: 🤖 Release Google Play
    needs: prepare-version
    uses: ./.github/workflows/gavra-google-production.yml
    with:
      git_ref: ${{ needs.prepare-version.outputs.target_ref }}
      bump_version: false
      version_name: ${{ needs.prepare-version.outputs.version_name }}
      version_code: ${{ needs.prepare-version.outputs.version_code }}
    secrets: inherit

  release-ios:
    name: 🍎 Release iOS
    needs: prepare-version
    uses: ./.github/workflows/ios-production.yml
    with:
      git_ref: ${{ needs.prepare-version.outputs.target_ref }}
      bump_version: false
      version_name: ${{ needs.prepare-version.outputs.version_name }}
      version_code: ${{ needs.prepare-version.outputs.version_code }}
      release_notes: ${{ inputs.release_notes }}
    secrets: inherit
