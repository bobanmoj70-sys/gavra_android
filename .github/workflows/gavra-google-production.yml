name: 🚀 Google Play Production Release

# Build, upload na Alpha i automatski promovisi na Production
on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: true
        default: true
        type: boolean
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  PRIVACY_POLICY_URL: 'https://lakisa-code.github.io/gavra_android/privacy-policy.html'
  ACCOUNT_DELETION_URL: 'https://lakisa-code.github.io/gavra_android/delete-account.html'

jobs:
  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    runs-on: ubuntu-latest
    outputs:
      VERSION_NAME: ${{ steps.version_bump.outputs.VERSION_NAME }}
      VERSION_CODE: ${{ steps.version_bump.outputs.VERSION_CODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Deploy policy docs to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "docs: sync privacy/delete-account pages [skip ci]"

      - name: Validate policy URLs
        run: |
          echo "Checking Privacy Policy URL: $PRIVACY_POLICY_URL"
          if ! curl -fsSL "$PRIVACY_POLICY_URL" | grep -qiE "Politika privatnosti|Privacy Policy"; then
            echo "❌ Privacy Policy URL is UNREACHABLE or invalid content!"
            exit 1
          fi
          echo "✅ Privacy Policy URL is reachable"

          echo "Checking Account Deletion URL: $ACCOUNT_DELETION_URL"
          if ! curl -fsSL "$ACCOUNT_DELETION_URL" | grep -qiE "Brisanje naloga|Account Deletion"; then
            echo "❌ Account Deletion URL is UNREACHABLE or invalid content!"
            exit 1
          fi
          echo "✅ Account Deletion URL is reachable"

      - name: Auto-Bump Version
        id: version_bump
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          SHOULD_BUMP="${{ inputs.bump_version }}"
          if [ -z "$SHOULD_BUMP" ]; then
            SHOULD_BUMP="true"
          fi

          if [ "$SHOULD_BUMP" = "true" ]; then
            NEW_CODE=$((VERSION_CODE + 1))
            MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
            MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
            PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
            NEW_VERSION="${NEW_NAME}+${NEW_CODE}"
            
            # Using standard sed for Linux (ubuntu-latest)
            sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            
            echo "VERSION_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
            echo "📌 Bumped: $CURRENT → $NEW_VERSION"
            
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
              git push origin HEAD:${{ github.ref_name }}
            fi
          else
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "Skipping version bump."
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare secrets (Linux)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GOOGLE_PLAY_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # 1. Restore Keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > android/app/gavra-release-key-production.keystore
          
          # 2. Create key.properties (Standard Android Signing Pattern)
          printf 'storePassword=%s
' "$KEYSTORE_PASSWORD" > android/key.properties
          printf 'keyPassword=%s
' "$KEY_PASSWORD" >> android/key.properties
          printf 'keyAlias=%s
' "$KEY_ALIAS" >> android/key.properties
          echo "storeFile=gavra-release-key-production.keystore" >> android/key.properties

          # 3. Restore Google Play JSON
          printf '%s' "$GOOGLE_PLAY_JSON_BASE64" | base64 --decode --ignore-garbage > android/google-service-account.json

          # 4. Restore .env file
          printf '%s' "$ENV_FILE_CONTENT" > .env

          # 5. Restore google-services.json
          printf '%s' "$GOOGLE_SERVICES_BASE64" | base64 --decode --ignore-garbage > android/app/google-services.json

      - name: 🛡️ Verify Keystore (Fail Fast)
        env:
           KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "Verifying Keystore integrity..."
          KEYSTORE_PATH="android/app/gavra-release-key-production.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            # Verify with keytool
            keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD" || exit 1
            echo "✅ Keystore verification PASSED."
          else
             echo "❌ Keystore file not found!"
             exit 1
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ steps.version_bump.outputs.VERSION_NAME }} --build-number=${{ steps.version_bump.outputs.VERSION_CODE }}

      - name: Upload to Google Play (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          releaseName: "v${{ steps.version_bump.outputs.VERSION_NAME }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ steps.version_bump.outputs.VERSION_CODE }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version_bump.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ steps.version_bump.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy:** $PRIVACY_POLICY_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Account Deletion:** $ACCOUNT_DELETION_URL" >> $GITHUB_STEP_SUMMARY

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  PRIVACY_POLICY_URL: 'https://lakisa-code.github.io/gavra_android/privacy-policy.html'
  ACCOUNT_DELETION_URL: 'https://lakisa-code.github.io/gavra_android/delete-account.html'

jobs:
  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    runs-on: ubuntu-latest
    outputs:
      VERSION_NAME: ${{ steps.version.outputs.VERSION_NAME }}
      VERSION_CODE: ${{ steps.version.outputs.VERSION_CODE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Deploy policy docs to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "docs: sync privacy/delete-account pages [skip ci]"

      - name: Validate policy URLs
        run: |
          echo "Checking Privacy Policy URL: $PRIVACY_POLICY_URL"
          curl -fsSL "$PRIVACY_POLICY_URL" | grep -qiE "Politika privatnosti|Privacy Policy"
          echo "✅ Privacy Policy URL is reachable"

          echo "Checking Account Deletion URL: $ACCOUNT_DELETION_URL"
          curl -fsSL "$ACCOUNT_DELETION_URL" | grep -qiE "Brisanje naloga|Account Deletion"
          echo "✅ Account Deletion URL is reachable"

      - name: Auto-Bump Version
        if: ${{ inputs.bump_version == true }}
        shell: bash
        run: |
          # Read version from pubspec.yaml
          LINE=$(grep "^version: " pubspec.yaml)
          VERSION_PART=$(echo "$LINE" | sed 's/version: //g' | cut -d+ -f1)
          BUILD_PART=$(echo "$LINE" | sed 's/.*+//g')

          # Split version into major.minor.patch
          IFS='.' read -r -a parts <<< "$VERSION_PART"
          MAJOR="${parts[0]}"
          MINOR="${parts[1]}"
          PATCH="${parts[2]}"

          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_PART + 1))
          
          # Handle minor carrier overflow (optional, but good practice if you want semi-auto minor)
          # if [ $NEW_PATCH -ge 100 ]; then NEW_PATCH=0; MINOR=$((MINOR + 1)); fi
          
          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          echo "[INFO] Bouncing version: $VERSION_PART+$BUILD_PART -> $NEW_VERSION"

          # Update file using sed (inplace)
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          # Git commit and push
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add pubspec.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-bump version [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Version bumped and pushed."
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare secrets (Linux)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          GOOGLE_PLAY_JSON_BASE64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}
          GOOGLE_SERVICES_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
          ENV_FILE_CONTENT: ${{ secrets.ENV_FILE_CONTENT }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          # DEBUG - provjera secretsa
          echo "KEYSTORE_BASE64 length: ${#KEYSTORE_BASE64}"
          echo "KEYSTORE_BASE64 first 20 chars: ${KEYSTORE_BASE64:0:20}"
          echo "KEYSTORE_BASE64 last 20 chars: ${KEYSTORE_BASE64: -20}"

          # 1. Restore Keystore
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode --ignore-garbage > android/app/gavra-release-key-production.keystore
          
          # 2. Create key.properties
          printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD" > android/key.properties
          printf 'keyPassword=%s\n' "$KEY_PASSWORD" >> android/key.properties
          printf 'keyAlias=%s\n' "$KEY_ALIAS" >> android/key.properties
          echo "storeFile=gavra-release-key-production.keystore" >> android/key.properties

          # 3. Restore Google Play JSON
          printf '%s' "$GOOGLE_PLAY_JSON_BASE64" | base64 --decode --ignore-garbage > android/google-service-account.json

          # 4. Restore .env file
          printf '%s' "$ENV_FILE_CONTENT" > .env

          # 5. Restore google-services.json
          printf '%s' "$GOOGLE_SERVICES_BASE64" | base64 --decode --ignore-garbage > android/app/google-services.json

      - name: 🛡️ Verify Keystore (Fail Fast)
        env:
           KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "Verifying Keystore integrity..."
          KEYSTORE_PATH="android/app/gavra-release-key-production.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            SIZE=$(stat -c%s "$KEYSTORE_PATH")
            echo "Keystore size: $SIZE bytes"
            
            if [ "$SIZE" -lt 100 ]; then
              echo "Keystore is too small! Likely corrupted."
              exit 1
            fi
            
            # Verify with keytool
            keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD"
            if [ $? -ne 0 ]; then
              echo "Keytool verification FAILED! Your KEYSTORE_BASE64 secret is likely invalid or corrupted."
              exit 1
            fi
            echo "✅ Keystore verification PASSED."
          else
             echo "Keystore file not found!"
             exit 1
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Get version info
        id: version
        shell: bash
        run: |
          VER_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | cut -d+ -f1)
          VER_CODE=$(grep '^version:' pubspec.yaml | sed 's/.*+//g')
          echo "VERSION_NAME=$VER_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VER_CODE" >> $GITHUB_OUTPUT
          echo "[INFO] Building v$VER_NAME ($VER_CODE)"

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ steps.version.outputs.VERSION_NAME }} --build-number=${{ steps.version.outputs.VERSION_CODE }}

      - name: Upload to Google Play (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab # Linux/Unix path
          track: production
          status: completed
          releaseName: "v${{ steps.version.outputs.VERSION_NAME }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Update Store Listing
        run: |
          pip install cryptography --quiet
          PACKAGE="com.gavra013.gavra_android"
          JSON_KEY="android/google-service-account.json"

          # Dohvati access token
          TOKEN=$(python3 - <<'PYEOF'
          import json, time, base64, urllib.request, urllib.parse
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          with open("android/google-service-account.json") as f:
              sa = json.load(f)

          now = int(time.time())
          header = base64.urlsafe_b64encode(json.dumps({"alg":"RS256","typ":"JWT"}).encode()).rstrip(b"=").decode()
          claim = base64.urlsafe_b64encode(json.dumps({
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/androidpublisher",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now, "exp": now + 3600
          }).encode()).rstrip(b"=").decode()

          msg = f"{header}.{claim}".encode()
          key = serialization.load_pem_private_key(sa["private_key"].encode(), password=None)
          sig = base64.urlsafe_b64encode(key.sign(msg, padding.PKCS1v15(), hashes.SHA256())).rstrip(b"=").decode()
          jwt = f"{header}.{claim}.{sig}"

          data = urllib.parse.urlencode({"grant_type":"urn:ietf:params:oauth:grant-type:jwt-bearer","assertion":jwt}).encode()
          req = urllib.request.Request("https://oauth2.googleapis.com/token", data=data)
          resp = json.loads(urllib.request.urlopen(req).read())
          print(resp["access_token"])
          PYEOF
          )

          BASE_URL="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE"

          # Otvori edit
          EDIT_ID=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE_URL/edits" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "[INFO] Edit ID: $EDIT_ID"

          # Ažuriraj sr-RS listing
          TITLE_FILE="distribution/store_listing/sr-RS/title.txt"
          SHORT_FILE="distribution/store_listing/sr-RS/short_description.txt"
          FULL_FILE="distribution/store_listing/sr-RS/full_description.txt"

          # UTF-8 check
          check_utf8() {
            file="$1"
            if ! iconv -f UTF-8 -t UTF-8 "$file" >/dev/null 2>&1; then
              echo "❌ Error: $file is NOT valid UTF-8!"
              exit 1
            fi
          }
          check_utf8 "$TITLE_FILE"
          check_utf8 "$SHORT_FILE"
          check_utf8 "$FULL_FILE"

          TITLE=$(cat "$TITLE_FILE")
          SHORT=$(cat "$SHORT_FILE")
          FULL=$(cat "$FULL_FILE")

          curl -s -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE_URL/edits/$EDIT_ID/listings/sr-RS" \
            -d "{\"title\": $(echo "$TITLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                 \"shortDescription\": $(echo "$SHORT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                 \"fullDescription\": $(echo "$FULL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))')}"

          echo "[INFO] sr-RS listing updated"

          # Commituj edit
          COMMIT_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE_URL/edits/$EDIT_ID:commit")
          echo "[INFO] Commit response: $COMMIT_RESP"
          echo "✅ Store Listing updated successfully"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ steps.version.outputs.VERSION_CODE }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy:** $PRIVACY_POLICY_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Account Deletion:** $ACCOUNT_DELETION_URL" >> $GITHUB_STEP_SUMMARY


