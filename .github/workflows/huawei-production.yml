name: 📱 Huawei AppGallery Upload

# Upload na Huawei AppGallery za review
on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'Submit for review after upload? (default: true)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_notes:
        description: 'Release notes (What is new)'
        required: false
        default: 'Ispravke grešaka i poboljšanja performansi.'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FLUTTER_VERSION: '3.35.6'

jobs:
  build-and-upload-huawei:
    name: 🚀 Build & Upload to Huawei
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      # - name: Setup Flutter
      #   uses: subosito/flutter-action@v2
      #   with:
      #     flutter-version: ${{ env.FLUTTER_VERSION }}
      #     channel: 'stable'

      - name: Prepare Secrets (Windows)
        env:
          AGC_BASE64: ${{ secrets.AGC_BASE64 }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          # 1. Restore agconnect
          $agcBytes = [System.Convert]::FromBase64String($env:AGC_BASE64)
          New-Item -ItemType Directory -Force -Path "android/app"
          New-Item -ItemType Directory -Force -Path "assets"
          [System.IO.File]::WriteAllBytes("$(Get-Location)\android\app\agconnect-services.json", $agcBytes)
          [System.IO.File]::WriteAllBytes("$(Get-Location)\assets\agconnect-services.json", $agcBytes)

          # 2. Restore Keystore
          $keystoreBytes = [System.Convert]::FromBase64String($env:KEYSTORE_BASE64)
          [System.IO.File]::WriteAllBytes("$(Get-Location)\android\app\upload-keystore.jks", $keystoreBytes)

          # 3. Create key.properties
          $keyProps = "storePassword=$env:STORE_PASSWORD`nkeyPassword=$env:KEY_PASSWORD`nkeyAlias=$env:KEY_ALIAS`nstoreFile=upload-keystore.jks"
          Set-Content -Path "android/key.properties" -Value $keyProps
          Write-Host "[OK] Secrets configured"

      - name: Get dependencies
        run: flutter pub get

      - name: Get version info
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version_name }}" ]; then
            VER_NAME="${{ github.event.inputs.version_name }}"
          else
            VER_NAME=$(grep "^version:" pubspec.yaml | sed 's/version: \([0-9]*\.[0-9]*\.[0-9]*\).*/\1/')
          fi
          echo "VERSION=$VER_NAME" >> $GITHUB_OUTPUT
          echo "[INFO] Version: $VER_NAME"

      - name: Build Release APK
        run: |
          flutter build apk --release
          echo "[OK] APK built successfully"

      - name: Upload to Huawei AppGallery
        id: upload
        env:
          HUAWEI_CLIENT_ID: ${{ secrets.AGC_CLIENT_ID }}
          HUAWEI_CLIENT_SECRET: ${{ secrets.AGC_CLIENT_SECRET }}
          HUAWEI_APP_ID: ${{ secrets.AGC_APP_ID }}
          VERSION: ${{ steps.version.outputs.VERSION }}
          SUBMIT: ${{ github.event.inputs.submit_for_review }}
        run: |
          echo "[INFO] Uploading to Huawei..."

          # 1. Get Token
          TOKEN_RESP=$(curl -s -X POST "https://connect-api.cloud.huawei.com/api/oauth2/v1/token" \
            -H "Content-Type: application/json" \
            -d "{\"client_id\":\"$HUAWEI_CLIENT_ID\",\"client_secret\":\"$HUAWEI_CLIENT_SECRET\",\"grant_type\":\"client_credentials\"}")
          ACCESS_TOKEN=$(echo "$TOKEN_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['access_token'])")
          if [ -z "$ACCESS_TOKEN" ]; then echo "Failed to get Access Token"; exit 1; fi
          echo "✅ Got Access Token"

          # 2. Get Upload URL
          UPLOAD_URL_RESP=$(curl -s -X GET \
            "https://connect-api.cloud.huawei.com/api/publish/v2/upload-url?appId=$HUAWEI_APP_ID&suffix=apk" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "client_id: $HUAWEI_CLIENT_ID")
          UPLOAD_URL=$(echo "$UPLOAD_URL_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['uploadUrl'])")
          AUTH_CODE=$(echo "$UPLOAD_URL_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['authCode'])")
          if [ -z "$UPLOAD_URL" ]; then echo "Failed to get Upload URL"; exit 1; fi

          # 3. Upload APK
          APK_PATH="build/app/outputs/flutter-apk/app-release.apk"
          echo "🚀 Uploading APK..."
          UPLOAD_RESULT=$(curl -s -X POST "$UPLOAD_URL" \
            -F "file=@$APK_PATH" \
            -F "authCode=$AUTH_CODE" \
            -F "fileCount=1")
          FILE_DEST_URL=$(echo "$UPLOAD_RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['result']['UploadFileRsp']['fileInfoList'][0]['fileDestUlr'])")
          if [ -z "$FILE_DEST_URL" ]; then echo "Failed to upload APK: $UPLOAD_RESULT"; exit 1; fi
          echo "✅ Uploaded. Dest URL: $FILE_DEST_URL"

          # 4. Update App File Info
          UPDATE_BODY="{\"appId\":\"$HUAWEI_APP_ID\",\"fileType\":5,\"files\":[{\"fileName\":\"app-release.apk\",\"fileDestUrl\":\"$FILE_DEST_URL\"}]}"
          curl -s -X PUT "https://connect-api.cloud.huawei.com/api/publish/v2/app-file-info?appId=$HUAWEI_APP_ID" \
            -H "Authorization: Bearer $ACCESS_TOKEN" \
            -H "client_id: $HUAWEI_CLIENT_ID" \
            -H "Content-Type: application/json" \
            -d "$UPDATE_BODY"
          echo "✅ App File Info Updated"

          # 5. Submit for Review
          if [ "$SUBMIT" = "true" ]; then
            echo "📤 Submitting for Review..."
            curl -s -X POST "https://connect-api.cloud.huawei.com/api/publish/v2/app-submit?appId=$HUAWEI_APP_ID" \
              -H "Authorization: Bearer $ACCESS_TOKEN" \
              -H "client_id: $HUAWEI_CLIENT_ID" \
              -H "Content-Type: application/json" \
              -d "{\"appId\":\"$HUAWEI_APP_ID\"}" || echo "Submit failed - check AppGallery Connect manually."
            echo "✅ App submitted!"
          fi

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: huawei-apk-v${{ steps.version.outputs.VERSION }}
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

