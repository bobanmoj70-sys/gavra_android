name: 🧪 Internal Testing Release

on:
  workflow_dispatch:
    inputs:
      version_suffix:
        description: 'Version suffix (e.g. "beta1", "hotfix", "test")'
        required: false
        default: 'internal'
        type: string

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.6'

jobs:
  build-internal:
    name: 🚀 Build & Upload Internal Testing
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate Internal Version
        id: version
        run: |
          # Uzmi trenutnu production verziju i dodaj suffix
          CURRENT=$(grep '^version:' pubspec.yaml | sed 's/version: //')
          BASE_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          BASE_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          
          SUFFIX="${{ inputs.version_suffix || 'internal' }}"
          TIMESTAMP=$(date +%m%d_%H%M)
          
          # Internal verzija: 6.0.171-internal-0325_1430
          INTERNAL_NAME="${BASE_NAME}-${SUFFIX}-${TIMESTAMP}"
          INTERNAL_CODE="$((BASE_CODE + 1000))" # Dodaj 1000 da se razlikuje
          
          echo "VERSION_NAME=$INTERNAL_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$INTERNAL_CODE" >> $GITHUB_OUTPUT
          echo "🏷️ Internal version: $INTERNAL_NAME ($INTERNAL_CODE)"

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare secrets
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/gavra-release-key-production.keystore
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > android/google-service-account.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          
          # Key properties za signing
          echo "storeFile=gavra-release-key-production.keystore" >> android/key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" >> android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties

      - name: Get dependencies
        run: flutter pub get

      - name: Build Internal AAB
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version.outputs.VERSION_CODE }}

      - name: Upload to Internal Testing
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          releaseName: "Internal Testing - ${{ steps.version.outputs.VERSION_NAME }}"

      - name: Generate Tester Instructions
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🧪 Internal Testing Ready!
          
          **Version:** ${{ steps.version.outputs.VERSION_NAME }} (Code: ${{ steps.version.outputs.VERSION_CODE }})
          **Track:** Internal Testing
          **Status:** ✅ Live and ready for testing
          
          ### 📱 Za vozače - kako da instaliraju:
          
          1. **Otvorite link:** [Google Play Internal Testing](https://play.google.com/apps/internaltest/4701516677103582169)
          2. **Prihvatite pozivnicu** za testiranje
          3. **Instalirajte** aplikaciju direktno sa Play Store-a
          4. **Automatski će se ažurirati** kada objavimo novu verziju
          
          ### ⚠️ Napomene:
          - Ova verzija je **nezavisna od production** verzije
          - Možete imati **obe verzije istovremeno** instaliranih
          - Internal verzija ima **drugačiju ikonu** sa "BETA" oznakom
          - Nema čekanje za Google review - **instant dostupnost**
          
          ### 📧 Dodavanje novih testera:
          Pošaljite email vozača na: \`gavriconi19@gmail.com\` sa napomenom "Dodaj u internal testing"
          EOF

      - name: Summary
        run: |
          echo "✅ Internal testing APK je uspešno kreiran!"
          echo "🚀 Vozači mogu odmah da počnu da koriste novu verziju"
          echo "📱 Link za instalaciju je dostupan u GitHub Actions summary"