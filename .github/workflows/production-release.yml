name: Production Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - both

permissions:
  contents: write

jobs:
  version-bump:
    if: ${{ github.event.inputs.target == 'android' || github.event.inputs.target == 'ios' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
    outputs:
      new_sha: ${{ steps.commit_push.outputs.new_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump version in pubspec.yaml
        shell: bash
        run: |
          python3 - <<'PY'
          import re

          file_path = "pubspec.yaml"
          with open(file_path, "r", encoding="utf-8") as file:
              content = file.read()

          match = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)\s*$", content, re.MULTILINE)
          if not match:
              raise SystemExit("pubspec.yaml version format must be x.y.z")

          major, minor, patch = map(int, match.groups())
          new_patch = patch + 1
          new_version = f"{major}.{minor}.{new_patch}"

          content = re.sub(r"^version:\s*.*$", f"version: {new_version}", content, count=1, flags=re.MULTILINE)
          with open(file_path, "w", encoding="utf-8") as file:
              file.write(content)

          print(f"Version bumped to {new_version}")
          PY

      - name: Commit and push version bump
        id: commit_push
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "Bump version to $(grep '^version:' pubspec.yaml | awk '{print $2}') [skip ci]"
          git pull --rebase https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          echo "new_sha=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

  android-release:
    needs: version-bump
    if: ${{ github.event.inputs.target == 'android' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug pubspec version
        run: cat pubspec.yaml | grep '^version:'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Prepare env file
        shell: bash
        run: |
          normalize() {
            printf "%s" "$1" | tr -d '\r\n\t '
          }

          decode_required_base64() {
            local secret_name="$1"
            local secret_value="$2"
            local output_file="$3"
            local normalized

            normalized="$(normalize "$secret_value")"
            if [ -z "$normalized" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi

            if ! printf "%s" "$normalized" | base64 -d > "$output_file" 2>/dev/null; then
              echo "Invalid base64 in required secret: $secret_name"
              exit 1
            fi
          }

          decode_required_base64 "APP_ENV_BASE64" "${{ secrets.APP_ENV_BASE64 }}" ".env"

          if ! grep -q '^SUPABASE_URL=' .env; then
            echo "APP_ENV_BASE64 must contain SUPABASE_URL"
            exit 1
          fi

          if ! grep -q '^SUPABASE_ANON_KEY=' .env; then
            echo "APP_ENV_BASE64 must contain SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Restore Android credentials from secrets
        shell: bash
        run: |
          mkdir -p android/app/src/main/assets

          trim_ws() {
            printf "%s" "$1" | tr -d '\r\n\t '
          }

          decode_required_base64() {
            local secret_name="$1"
            local secret_value="$2"
            local output_file="$3"
            local normalized

            normalized="$(trim_ws "$secret_value")"
            if [ -z "$normalized" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi

            if ! printf "%s" "$normalized" | base64 -d > "$output_file" 2>/dev/null; then
              echo "Invalid base64 in required secret: $secret_name"
              exit 1
            fi
          }

          decode_required_base64 "ANDROID_KEYSTORE_BASE64" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" "android/app/release-keystore.jks"

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

          decode_required_base64 "ANDROID_GOOGLE_SERVICES_JSON_BASE64" "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}" "android/app/google-services.json"

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Restore Google Play service account
        shell: bash
        run: |
          normalized="$(printf "%s" "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | tr -d '\r\n\t ')"
          if [ -z "$normalized" ]; then
            echo "Missing required secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64"
            exit 1
          fi
          if ! printf "%s" "$normalized" | base64 -d > android/play-service-account.json 2>/dev/null; then
            echo "Invalid base64 in required secret: GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64"
            exit 1
          fi

      - name: Upload to Google Play Production
        uses: r0adkll/upload-google-play@v1.1.5
        with:
          serviceAccountJson: android/play-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          tracks: production
          status: completed

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  ios-release:
    needs: version-bump
    if: ${{ github.event.inputs.target == 'ios' || github.event.inputs.target == 'both' }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      BUNDLE_ID: com.gavra013.gavra013ios

    steps:
      - name: Checkout bumped commit
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.version-bump.outputs.new_sha }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug pubspec version
        run: cat pubspec.yaml | grep '^version:'

      - name: Select Xcode 26
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '26.0'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install iOS signing tools
        run: pip3 install codemagic-cli-tools --break-system-packages

      - name: Prepare env file
        shell: bash
        run: |
          normalize() {
            printf "%s" "$1" | tr -d '\r\n\t '
          }

          decode_required_base64() {
            local secret_name="$1"
            local secret_value="$2"
            local output_file="$3"
            local normalized

            normalized="$(normalize "$secret_value")"
            if [ -z "$normalized" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi

            if ! printf "%s" "$normalized" | base64 -d > "$output_file" 2>/dev/null; then
              echo "Invalid base64 in required secret: $secret_name"
              exit 1
            fi
          }

          decode_required_base64 "APP_ENV_BASE64" "${{ secrets.APP_ENV_BASE64 }}" ".env"

          if ! grep -q '^SUPABASE_URL=' .env; then
            echo "APP_ENV_BASE64 must contain SUPABASE_URL"
            exit 1
          fi

          if ! grep -q '^SUPABASE_ANON_KEY=' .env; then
            echo "APP_ENV_BASE64 must contain SUPABASE_ANON_KEY"
            exit 1
          fi

      - name: Restore App Store Connect key
        shell: bash
        run: |
          mkdir -p ~/.private_keys
          normalized="$(printf "%s" "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}" | tr -d '\r\n\t ')"
          if [ -z "$normalized" ]; then
            echo "Missing required secret: APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
            exit 1
          fi
          if ! printf "%s" "$normalized" | base64 -d > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}.p8 2>/dev/null; then
            echo "Invalid base64 in required secret: APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
            exit 1
          fi

      - name: Restore certificate private key
        shell: bash
        run: |
          normalized="$(printf "%s" "${{ secrets.CERTIFICATE_PRIVATE_KEY_BASE64 }}" | tr -d '\r\n\t ')"
          if [ -z "$normalized" ]; then
            echo "Missing required secret: CERTIFICATE_PRIVATE_KEY_BASE64"
            exit 1
          fi
          if ! printf "%s" "$normalized" | base64 -d > /tmp/certificate_private_key.pem 2>/dev/null; then
            echo "Invalid base64 in required secret: CERTIFICATE_PRIVATE_KEY_BASE64"
            exit 1
          fi

      - name: Flutter dependencies
        run: flutter pub get

      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: "@file:${HOME}/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}.p8"
          CERTIFICATE_PRIVATE_KEY: "@file:/tmp/certificate_private_key.pem"
        run: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: xcode-project use-profiles

      - name: Verify Xcode and iOS SDK
        run: |
          xcodebuild -version
          xcodebuild -showsdks
          if ! xcodebuild -showsdks | grep -Eq "iphoneos26(\\.[0-9]+)?"; then
            echo "Required iOS 26 SDK not found. Use Xcode 26 or later."
            exit 1
          fi

      - name: Enable Push Notifications Entitlements
        run: |
          python3 - <<'PY'
          import re
          import os

          pbxproj_path = "ios/Runner.xcodeproj/project.pbxproj"
          if os.path.exists(pbxproj_path):
              with open(pbxproj_path, "r", encoding="utf-8") as file:
                  content = file.read()

              modified_content = re.sub(
                  r'(PRODUCT_BUNDLE_IDENTIFIER\s*=\s*(.*?);)',
                  r'\1 CODE_SIGN_ENTITLEMENTS = Runner/Runner.entitlements;',
                  content
              )

              with open(pbxproj_path, "w", encoding="utf-8") as file:
                  file.write(modified_content)
              print("Uspesno povezan Runner.entitlements za Push Notifikacije.")
          else:
              print("project.pbxproj fajl nije nadjen.")
          PY

      - name: Build iOS IPA
        run: |
          flutter build ipa --release --export-options-plist=$HOME/export_options.plist

      - name: Install Fastlane dependencies
        run: |
          cd ios
          bundle install

      - name: Resolve IPA path
        run: |
          IPA_REL_PATH=$(find build -name '*.ipa' | head -1)
          if [ -z "$IPA_REL_PATH" ]; then
            echo "IPA file not found"
            exit 1
          fi
          IPA_PATH="$(pwd)/${IPA_REL_PATH}"
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

      - name: Prepare App Store Connect API key JSON
        run: |
          ASC_KEY_IDENTIFIER_CLEAN=$(printf '%s' "${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}" | tr -d '\r\n')
          ASC_ISSUER_ID_CLEAN=$(printf '%s' "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" | tr -d '\r\n')
          ASC_KEY_PATH="${HOME}/.private_keys/AuthKey_${ASC_KEY_IDENTIFIER_CLEAN}.p8"
          export ASC_KEY_IDENTIFIER_CLEAN ASC_ISSUER_ID_CLEAN ASC_KEY_PATH
          python3 -c "import json,os; payload={'key_id': os.environ['ASC_KEY_IDENTIFIER_CLEAN'], 'issuer_id': os.environ['ASC_ISSUER_ID_CLEAN'], 'key': open(os.environ['ASC_KEY_PATH'], 'r', encoding='utf-8').read(), 'in_house': False}; open('/tmp/asc_api_key.json', 'w', encoding='utf-8').write(json.dumps(payload))"
          echo "ASC_API_KEY_JSON=/tmp/asc_api_key.json" >> $GITHUB_ENV

      - name: Upload to TestFlight
        run: |
          cd ios
          bundle exec fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "$ASC_API_KEY_JSON" \
            --skip_waiting_for_build_processing false \
            --distribute_external false \
            --changelog "Automated production build."
