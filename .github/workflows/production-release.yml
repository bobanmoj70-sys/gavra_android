name: Production Release

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Release target"
        required: true
        default: "android"
        type: choice
        options:
          - android
          - ios
          - both

jobs:
  android-release:
    if: ${{ github.event.inputs.target == 'android' || github.event.inputs.target == 'both' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter dependencies
        run: flutter pub get

      - name: Prepare env file
        shell: bash
        run: |
          if [ -n "${{ secrets.DOTENV_FILE_CONTENTS }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE_CONTENTS }}" > .env
          else
            touch .env
          fi

      - name: Autobump app version and build
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import os
          import re

          run_number = int(os.environ.get("RUN_NUMBER", "0"))
          file_path = "pubspec.yaml"

          with open(file_path, "r", encoding="utf-8") as file:
              content = file.read()

          match = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$", content, re.MULTILINE)
          if not match:
              raise SystemExit("pubspec.yaml version format must be x.y.z+n")

          major, minor, patch, build = map(int, match.groups())
          new_patch = patch + run_number
          new_build = build + run_number
          new_version = f"{major}.{minor}.{new_patch}+{new_build}"

          content = re.sub(r"^version:\s*.*$", f"version: {new_version}", content, count=1, flags=re.MULTILINE)
          with open(file_path, "w", encoding="utf-8") as file:
              file.write(content)

          print(f"Version bumped to {new_version}")
          PY

      - name: Restore Android credentials from secrets
        shell: bash
        run: |
          mkdir -p android/app/src/main/assets

          trim_ws() {
            printf "%s" "$1" | tr -d '\r\n\t '
          }

          decode_required_base64() {
            local secret_name="$1"
            local secret_value="$2"
            local output_file="$3"
            local normalized

            normalized="$(trim_ws "$secret_value")"
            if [ -z "$normalized" ]; then
              echo "Missing required secret: $secret_name"
              exit 1
            fi

            if ! printf "%s" "$normalized" | base64 -d > "$output_file" 2>/dev/null; then
              echo "Invalid base64 in required secret: $secret_name"
              exit 1
            fi
          }

          decode_json_or_base64() {
            local secret_value="$1"
            local output_file="$2"
            local normalized
            local temp_file
            local first_char

            normalized="$(trim_ws "$secret_value")"
            if [ -z "$normalized" ]; then
              return 0
            fi

            temp_file="$(mktemp)"
            first_char="$(printf "%s" "$secret_value" | sed -e 's/^[[:space:]]*//' -e 's/\(.\).*/\1/')"

            if [ "$first_char" = "{" ] || [ "$first_char" = "[" ] || [ "$first_char" = '"' ]; then
              printf "%s" "$secret_value" > "$temp_file"
            elif ! printf "%s" "$normalized" | base64 -d > "$temp_file" 2>/dev/null; then
              printf "%s" "$secret_value" > "$temp_file"
            fi

            if ! python3 -c "import json,pathlib,sys; src=pathlib.Path(sys.argv[1]); dst=pathlib.Path(sys.argv[2]); txt=src.read_bytes().decode('utf-8-sig').strip(); assert txt, 'empty secret payload'; parsed=json.loads(txt); parsed=json.loads(parsed.strip()) if isinstance(parsed,str) else parsed; assert isinstance(parsed,dict), 'JSON root must be an object'; dst.write_text(json.dumps(parsed,separators=(',',':')),encoding='utf-8')" "$temp_file" "$output_file"
            then
              rm -f "$temp_file"
              echo "Invalid JSON secret payload for $output_file"
              exit 1
            fi

            rm -f "$temp_file"
          }

          decode_required_base64 "ANDROID_KEYSTORE_BASE64" "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" "android/app/release-keystore.jks"

          cat > android/key.properties <<EOF
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=release-keystore.jks
          EOF

          decode_json_or_base64 "${{ secrets.ANDROID_GOOGLE_SERVICES_JSON_BASE64 }}" "android/app/google-services.json"

          if [ ! -s android/app/google-services.json ]; then
            echo "Missing or empty ANDROID_GOOGLE_SERVICES_JSON_BASE64 secret"
            exit 1
          fi

          if [ -n "$(printf "%s" "${{ secrets.ANDROID_AGCONNECT_SERVICES_JSON_BASE64 }}" | tr -d '[:space:]')" ]; then
            decode_json_or_base64 "${{ secrets.ANDROID_AGCONNECT_SERVICES_JSON_BASE64 }}" "android/app/src/main/assets/agconnect-services.json"
          fi

      - name: Build release AAB
        run: flutter build appbundle --release -v -- --stacktrace --info

      - name: Restore Google Play service account
        shell: bash
        run: |
          printf "%s" "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 -d > android/play-service-account.json

      - name: Upload to Google Play Production
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: android/play-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Upload AAB artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab

  ios-release:
    if: ${{ github.event.inputs.target == 'ios' || github.event.inputs.target == 'both' }}
    runs-on: macos-latest
    timeout-minutes: 90
    env:
      BUNDLE_ID: com.gavra013.gavra013ios

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install iOS signing tools
        run: pip3 install codemagic-cli-tools --break-system-packages

      - name: Prepare env file
        shell: bash
        run: |
          if [ -n "${{ secrets.IOS_ENV }}" ]; then
            printf "%s" "${{ secrets.IOS_ENV }}" > .env
          else
            touch .env
          fi

      - name: Autobump app version and build
        shell: bash
        env:
          RUN_NUMBER: ${{ github.run_number }}
        run: |
          python3 - <<'PY'
          import os
          import re

          run_number = int(os.environ.get("RUN_NUMBER", "0"))
          file_path = "pubspec.yaml"

          with open(file_path, "r", encoding="utf-8") as file:
              content = file.read()

          match = re.search(r"^version:\s*(\d+)\.(\d+)\.(\d+)\+(\d+)\s*$", content, re.MULTILINE)
          if not match:
              raise SystemExit("pubspec.yaml version format must be x.y.z+n")

          major, minor, patch, build = map(int, match.groups())
          new_patch = patch + run_number
          new_build = build + run_number
          new_version = f"{major}.{minor}.{new_patch}+{new_build}"

          content = re.sub(r"^version:\s*.*$", f"version: {new_version}", content, count=1, flags=re.MULTILINE)
          with open(file_path, "w", encoding="utf-8") as file:
              file.write(content)

          print(f"Version bumped to {new_version}")
          PY

      - name: Restore App Store Connect key
        shell: bash
        run: |
          mkdir -p ~/.private_keys
          printf "%s" "${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}" | tr -d '\n\r ' | base64 -d > ~/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}.p8

      - name: Restore certificate private key
        shell: bash
        run: |
          printf "%s" "${{ secrets.CERTIFICATE_PRIVATE_KEY_BASE64 }}" | tr -d '\n\r ' | base64 -d > /tmp/certificate_private_key.pem

      - name: Flutter dependencies
        run: flutter pub get

      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
          APP_STORE_CONNECT_PRIVATE_KEY: "@file:${HOME}/.private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}.p8"
          CERTIFICATE_PRIVATE_KEY: "@file:/tmp/certificate_private_key.pem"
        run: app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: xcode-project use-profiles

      - name: Build iOS IPA
        run: flutter build ipa --release --export-options-plist=$HOME/export_options.plist

      - name: Install Fastlane dependencies
        run: |
          cd ios
          bundle install

      - name: Resolve IPA path
        run: |
          IPA_REL_PATH=$(find build -name '*.ipa' | head -1)
          if [ -z "$IPA_REL_PATH" ]; then
            echo "IPA file not found"
            exit 1
          fi
          IPA_PATH="$(pwd)/${IPA_REL_PATH}"
          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV

      - name: Prepare App Store Connect API key JSON
        run: |
          ASC_KEY_IDENTIFIER_CLEAN=$(printf '%s' "${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}" | tr -d '\r\n')
          ASC_ISSUER_ID_CLEAN=$(printf '%s' "${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}" | tr -d '\r\n')
          ASC_KEY_PATH="${HOME}/.private_keys/AuthKey_${ASC_KEY_IDENTIFIER_CLEAN}.p8"
          export ASC_KEY_IDENTIFIER_CLEAN ASC_ISSUER_ID_CLEAN ASC_KEY_PATH
          python3 -c "import json,os; payload={'key_id': os.environ['ASC_KEY_IDENTIFIER_CLEAN'], 'issuer_id': os.environ['ASC_ISSUER_ID_CLEAN'], 'key': open(os.environ['ASC_KEY_PATH'], 'r', encoding='utf-8').read(), 'in_house': False}; open('/tmp/asc_api_key.json', 'w', encoding='utf-8').write(json.dumps(payload))"
          echo "ASC_API_KEY_JSON=/tmp/asc_api_key.json" >> $GITHUB_ENV

      - name: Upload to TestFlight
        run: |
          cd ios
          bundle exec fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "$ASC_API_KEY_JSON" \
            --skip_waiting_for_build_processing false \
            --distribute_external false \
            --changelog "Automated production build."
