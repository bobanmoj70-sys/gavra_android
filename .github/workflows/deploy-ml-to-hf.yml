name: Deploy ML to Hugging Face Space

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Push ml-service to HF Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

          git clone https://gavriconi:$HF_TOKEN@huggingface.co/spaces/gavriconi/gavra-ml-api /tmp/hf-space

          rsync -av --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='cloudflared.exe' \
            --exclude='*.bat' \
            --exclude='*.ps1' \
            --exclude='logs/' \
            --exclude='models/saved/' \
            --exclude='__pycache__/' \
            --exclude='RENDER_DEPLOY.md' \
            --exclude='STARTUP_README.md' \
            --exclude='Procfile' \
            ml-service/ /tmp/hf-space/

          cd /tmp/hf-space
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "Auto-deploy from GitHub: ${{ github.sha }}"
            git push
          else
            echo "Nema izmena za deploy."
          fi
