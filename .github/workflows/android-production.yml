name: 🚀 Google Play Production Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  PRIVACY_POLICY_URL: 'https://gavra-notif-20250920162521.web.app/privacy-policy.html'
  ACCOUNT_DELETION_URL: 'https://gavra-notif-20250920162521.web.app/delete-account.html'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  versioning:
    name: 🔢 Shared Autobump
    uses: ./.github/workflows/version-bump.yml
    with:
      git_ref: ${{ inputs.git_ref || github.ref }}

  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    needs: versioning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔐 Prepare secrets
        env:
          ANDROID_KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 || secrets.KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD || secrets.STORE_PASSWORD }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD || secrets.KEY_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS || secrets.KEY_ALIAS }}
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 || secrets.GOOGLE_SERVICES_BASE64 }}
          GOOGLE_PLAY_KEY_B64: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 || secrets.GOOGLE_PLAY_KEY_B64 }}
        run: |
          mkdir -p android/app
          
          # Write Keystore
          echo "$ANDROID_KEYSTORE_B64" | base64 -d > android/app/gavra-release-key-production.keystore

          # Write key.properties
          cat <<EOF > android/key.properties
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=gavra-release-key-production.keystore
          EOF

          # Write google-services.json
          if [ -n "$GOOGLE_SERVICES_JSON_BASE64" ]; then
            echo "$GOOGLE_SERVICES_JSON_BASE64" | base64 -d > android/app/google-services.json
          fi

          # Write Play Store Key
          if [ -n "$GOOGLE_PLAY_KEY_B64" ]; then
            echo "$GOOGLE_PLAY_KEY_B64" | base64 -d > android/google-service-account.json
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ needs.versioning.outputs.version_name }} --build-number=${{ needs.versioning.outputs.version_code }}

      - name: Upload to Google Play (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          releaseName: "v${{ needs.versioning.outputs.version_name }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ needs.versioning.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.versioning.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ needs.versioning.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy:** $PRIVACY_POLICY_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Account Deletion:** $ACCOUNT_DELETION_URL" >> $GITHUB_STEP_SUMMARY

