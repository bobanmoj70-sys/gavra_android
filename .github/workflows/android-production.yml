name: 🚀 Google Play Production Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  PRIVACY_POLICY_URL: 'https://lakisa-code.github.io/gavra_android/privacy-policy.html'
  ACCOUNT_DELETION_URL: 'https://lakisa-code.github.io/gavra_android/delete-account.html'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  versioning:
    name: 🔢 Shared Autobump
    uses: ./.github/workflows/version-bump.yml
    with:
      git_ref: ${{ inputs.git_ref || github.ref }}

  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    needs: versioning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Validate policy URLs
        run: |
          echo "Checking Privacy Policy URL: $PRIVACY_POLICY_URL"
          if ! curl -fsSL "$PRIVACY_POLICY_URL" | grep -qiE "Politika privatnosti|Privacy Policy"; then
            echo "❌ Privacy Policy URL is UNREACHABLE or invalid content!"
            exit 1
          fi
          echo "✅ Privacy Policy URL is reachable"

          echo "Checking Account Deletion URL: $ACCOUNT_DELETION_URL"
          if ! curl -fsSL "$ACCOUNT_DELETION_URL" | grep -qiE "Brisanje naloga|Account Deletion"; then
            echo "❌ Account Deletion URL is UNREACHABLE or invalid content!"
            exit 1
          fi
          echo "✅ Account Deletion URL is reachable"

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare secrets (Linux)
        env:
          ANDROID_ENV: ${{ secrets.ANDROID_ENV }}
        run: |
          mkdir -p secrets
          printf '%s' "$ANDROID_ENV" > secrets/.env.android

          export $(grep -v '^#' secrets/.env.android | xargs)          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode --ignore-garbage > android/app/gavra-release-key-production.keystore
          printf 'storePassword=%s\nkeyPassword=%s\nkeyAlias=%s\nstoreFile=gavra-release-key-production.keystore\n' "$ANDROID_STORE_PASSWORD" "$ANDROID_KEY_PASSWORD" "$ANDROID_KEY_ALIAS" > android/key.properties
          printf '%s' "$PLAY_STORE_KEY_JSON_BASE64" | base64 --decode --ignore-garbage > android/google-service-account.json
          printf '%s' "$GOOGLE_SERVICES_JSON_BASE64" | base64 --decode --ignore-garbage > android/app/google-services.json

      - name: 🛡️ Verify Keystore (Fail Fast)
        run: |
          export $(grep -v '^#' .env | xargs)
          echo "Verifying Keystore integrity..."
          KEYSTORE_PATH="android/app/gavra-release-key-production.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            # Verify with keytool
            keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$ANDROID_STORE_PASSWORD" || exit 1
            echo "✅ Keystore verification PASSED."
          else
             echo "❌ Keystore file not found!"
             exit 1
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ needs.versioning.outputs.version_name }} --build-number=${{ needs.versioning.outputs.version_code }}

      - name: Upload to Google Play (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          releaseName: "v${{ needs.versioning.outputs.version_name }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ needs.versioning.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.versioning.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ needs.versioning.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy:** $PRIVACY_POLICY_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Account Deletion:** $ACCOUNT_DELETION_URL" >> $GITHUB_STEP_SUMMARY

