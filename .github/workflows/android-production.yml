name: 🚀 Google Play Production Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  PRIVACY_POLICY_URL: 'https://gavra-notif-20250920162521.web.app/privacy-policy.html'
  ACCOUNT_DELETION_URL: 'https://gavra-notif-20250920162521.web.app/delete-account.html'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  versioning:
    name: 🔢 Shared Autobump
    uses: ./.github/workflows/version-bump.yml
    with:
      git_ref: ${{ inputs.git_ref || github.ref }}

  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    needs: versioning
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: 🔐 Prepare secrets
        env:
          ANDROID_ENV: ${{ vars.ANDROID_ENV || secrets.ANDROID_ENV }}
        run: |
          echo "$ANDROID_ENV" > .env
          python - <<'PY'
          import os, base64
          env_text = open(".env").read()
          env_dict = {}
          for line in env_text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              if line.startswith("export "): line = line[7:]
              if "=" in line:
                  k, v = line.split("=", 1)
                  env_dict[k.strip()] = v.strip("\"' ")

          ks_b64 = env_dict.get("ANDROID_KEYSTORE_BASE64", "")
          if ks_b64:
              open("android/app/gavra-release-key-production.keystore", "wb").write(base64.b64decode(ks_b64))

          store_pass = env_dict.get("ANDROID_STORE_PASSWORD", "")
          key_pass = env_dict.get("ANDROID_KEY_PASSWORD", "")
          key_alias = env_dict.get("ANDROID_KEY_ALIAS", "")

          with open("android/key.properties", "w") as f:
              f.write(f"storePassword={store_pass}\n")
              f.write(f"keyPassword={key_pass}\n")
              f.write(f"keyAlias={key_alias}\n")
              f.write("storeFile=gavra-release-key-production.keystore\n")

          gs_b64 = env_dict.get("GOOGLE_SERVICES_JSON_BASE64", "")
          if gs_b64:
              open("android/app/google-services.json", "wb").write(base64.b64decode(gs_b64))

          ps_b64 = env_dict.get("PLAY_STORE_KEY_JSON_BASE64", "")
          if ps_b64:
              open("android/google-service-account.json", "wb").write(base64.b64decode(ps_b64))
          PY

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ needs.versioning.outputs.version_name }} --build-number=${{ needs.versioning.outputs.version_code }}

      - name: Upload to Google Play (Production)
        uses: r0adkll/upload-google-play@v1.1.3
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed
          releaseName: "v${{ needs.versioning.outputs.version_name }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ needs.versioning.outputs.version_code }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ needs.versioning.outputs.version_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ needs.versioning.outputs.version_code }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Production" >> $GITHUB_STEP_SUMMARY
          echo "**Privacy Policy:** $PRIVACY_POLICY_URL" >> $GITHUB_STEP_SUMMARY
          echo "**Account Deletion:** $ACCOUNT_DELETION_URL" >> $GITHUB_STEP_SUMMARY

