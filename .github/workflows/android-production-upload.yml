name: Android Production Upload

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Ensure .env exists for Flutter assets
        shell: bash
        run: |
          if [ -n "${{ secrets.DOTENV_FILE_CONTENTS }}" ]; then
            printf "%s" "${{ secrets.DOTENV_FILE_CONTENTS }}" > .env
          else
            touch .env
          fi

      - name: Create Android signing files
        shell: bash
        run: |
          mkdir -p android/app
          KEYSTORE_B64="${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
          [ -z "$KEYSTORE_B64" ] && KEYSTORE_B64="${{ secrets.ANDROID_KEYSTORE_B64 }}"
          [ -z "$KEYSTORE_B64" ] && KEYSTORE_B64="${{ secrets.KEYSTORE_BASE64 }}"

          STORE_PASSWORD="${{ secrets.ANDROID_KEYSTORE_PASSWORD }}"
          [ -z "$STORE_PASSWORD" ] && STORE_PASSWORD="${{ secrets.STORE_PASSWORD }}"

          KEY_PASSWORD="${{ secrets.ANDROID_KEY_PASSWORD }}"
          [ -z "$KEY_PASSWORD" ] && KEY_PASSWORD="${{ secrets.KEY_PASSWORD }}"

          KEY_ALIAS="${{ secrets.ANDROID_KEY_ALIAS }}"
          [ -z "$KEY_ALIAS" ] && KEY_ALIAS="${{ secrets.KEY_ALIAS }}"

          if [ -z "$KEYSTORE_B64" ] || [ -z "$STORE_PASSWORD" ] || [ -z "$KEY_PASSWORD" ] || [ -z "$KEY_ALIAS" ]; then
            echo "Missing Android signing secrets. Required: keystore base64, store password, key password, key alias."
            exit 1
          fi

          printf "%s" "$KEYSTORE_B64" | base64 -d > android/app/release-keystore.jks

          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json
          elif [ -n "${{ secrets.GOOGLE_SERVICES_BASE64 }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_BASE64 }}" | base64 -d > android/app/google-services.json
          elif [ -n "${{ secrets.GOOGLE_SERVICES_JSON }}" ]; then
            printf "%s" "${{ secrets.GOOGLE_SERVICES_JSON }}" > android/app/google-services.json
          else
            echo "Missing Google services secret (GOOGLE_SERVICES_JSON_BASE64 or GOOGLE_SERVICES_JSON)."
            exit 1
          fi

          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=release-keystore.jks
          EOF

      - name: Autobump Android build number
        shell: bash
        run: |
          VERSION_LINE=$(grep '^version:' pubspec.yaml | tr -d ' ')
          VERSION_NAME=${VERSION_LINE#version:}
          VERSION_BASE=${VERSION_NAME%+*}
          VERSION_BUILD=${VERSION_NAME#*+}
          NEW_BUILD_NUMBER=$((VERSION_BUILD + GITHUB_RUN_NUMBER))
          sed -i "s/^version: .*/version: ${VERSION_BASE}+${NEW_BUILD_NUMBER}/" pubspec.yaml
          echo "Android version synced: ${VERSION_BASE}+${NEW_BUILD_NUMBER}"

      - name: Build release AAB
        run: flutter build appbundle --release

      - name: Write Google Play service account
        shell: bash
        run: |
          PLAY_JSON="${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}"
          PLAY_B64="${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}"
          [ -z "$PLAY_B64" ] && PLAY_B64="${{ secrets.GOOGLE_PLAY_KEY_B64 }}"

          if [ -n "$PLAY_JSON" ]; then
            printf "%s" "$PLAY_JSON" > android/play-service-account.json
          elif [ -n "$PLAY_B64" ]; then
            printf "%s" "$PLAY_B64" | base64 -d > android/play-service-account.json
          else
            echo "Missing Play service account secret (PLAY_SERVICE_ACCOUNT_JSON or GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64/GOOGLE_PLAY_KEY_B64)."
            exit 1
          fi

      - name: Upload to Google Play Production
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: android/play-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: production
          status: completed

      - name: Upload build artifact (AAB)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: build/app/outputs/bundle/release/app-release.aab
