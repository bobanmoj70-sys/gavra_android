name: ✅ PR Basic Check

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  basic-check:
    name: basic-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate repository structure
        run: |
          test -f pubspec.yaml
          test -d lib
          echo "✅ Repository structure looks good"