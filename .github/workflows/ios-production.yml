name: 🍎 iOS Production Release

on:
  workflow_dispatch:
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  BUNDLE_ID: 'com.gavra013.gavra013ios'
  APP_ID: '6757114361'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  versioning:
    name: 🔢 Shared Autobump
    uses: ./.github/workflows/version-bump.yml
    with:
      git_ref: ${{ inputs.git_ref || github.ref }}

  build-and-submit:
    name: 🚀 Build & Submit to App Store
    needs: versioning
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ vars.APP_STORE_CONNECT_ISSUER_ID || secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ vars.APP_STORE_CONNECT_KEY_IDENTIFIER || secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Prepare secrets (macOS)
        env:
          IOS_ENV: ${{ vars.IOS_ENV || secrets.IOS_ENV }}
        run: |
          echo "$IOS_ENV" > .env.ios
          python3 -c '
          import os, base64
          env_text = open(".env.ios").read()
          env_dict = {}
          for line in env_text.splitlines():
              line = line.strip()
              if not line or line.startswith("#"): continue
              if line.startswith("export "): line = line[7:]
              if "=" in line:
                  k, v = line.split("=", 1)
                  env_dict[k.strip()] = v.strip("\"'\ ")

          gs_b64 = env_dict.get("IOS_GOOGLE_SERVICES_PLIST_BASE64", "")
          if gs_b64:
              os.makedirs("ios/Runner", exist_ok=True)
              open("ios/Runner/GoogleService-Info.plist", "wb").write(base64.b64decode(gs_b64))

          cert_b64 = env_dict.get("IOS_CERT_PRIVATE_KEY_BASE64", "")
          if cert_b64:
              open("/tmp/certificate_private_key.pem", "wb").write(base64.b64decode(cert_b64))

          p8_b64 = env_dict.get("AUTH_KEY_P8_BASE64", "")
          if p8_b64:
              key_id = os.environ.get("APP_STORE_CONNECT_KEY_IDENTIFIER", "")
              os.makedirs(os.path.expanduser("~/.private_keys"), exist_ok=True)
              p8_path = os.path.expanduser(f"~/.private_keys/AuthKey_{key_id}.p8")
              open(p8_path, "wb").write(base64.b64decode(p8_b64))

              with open(os.environ["GITHUB_ENV"], "a") as f:
                  f.write("CERTIFICATE_PRIVATE_KEY=@file:/tmp/certificate_private_key.pem\n")
                  f.write(f"APP_STORE_CONNECT_PRIVATE_KEY=@file:{p8_path}\n")
          '

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'      - name: Install iOS signing CLI tools
        run: pip3 install codemagic-cli-tools

      - name: Get dependencies
        run: flutter pub get

      - name: Install iOS pods
        run: |
          cd ios
          pod install --repo-update

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: |
          xcode-project use-profiles
          echo "--- ExportOptions.plist generated by use-profiles ---"
          cat $HOME/export_options.plist || echo "(not found at $HOME/export_options.plist)"

      - name: Build iOS App
        run: |
          flutter build ipa --release \
            --build-name=${{ needs.versioning.outputs.version_name }} \
            --build-number=${{ needs.versioning.outputs.version_code }} \
            --export-options-plist=$HOME/export_options.plist

      - name: List build outputs (for debugging)
        run: |
          echo "Listing build directory contents"
          ls -la build || true
          echo "Listing build/ios contents"
          ls -la build/ios || true
          echo "Listing possible ipa folder"
          ls -la build/ios/ipa || true
          echo "Searching for any .ipa files"
          find build -name '*.ipa' -print || true

      - name: Resolve IPA path
        run: |
          IPA_REL_PATH=$(find build -name '*.ipa' | head -1)
          if [ -z "$IPA_REL_PATH" ]; then
            echo "❌ IPA file not found"
            exit 1
          fi

          IPA_PATH="$(pwd)/${IPA_REL_PATH}"
          if [ ! -f "$IPA_PATH" ]; then
            echo "❌ IPA path resolved but file does not exist: $IPA_PATH"
            exit 1
          fi

          echo "IPA_PATH=$IPA_PATH" >> $GITHUB_ENV
          echo "✅ IPA: $IPA_PATH"

      - name: Install Fastlane dependencies
        run: |
          cd ios
          bundle install

      - name: Prepare App Store Connect API key JSON
        run: |
          ASC_KEY_IDENTIFIER_CLEAN=$(printf '%s' "$APP_STORE_CONNECT_KEY_IDENTIFIER" | tr -d '\r\n')
          ASC_ISSUER_ID_CLEAN=$(printf '%s' "$APP_STORE_CONNECT_ISSUER_ID" | tr -d '\r\n')

          ASC_KEY_PATH="${HOME}/.private_keys/AuthKey_${ASC_KEY_IDENTIFIER_CLEAN}.p8"
          if [ ! -f "$ASC_KEY_PATH" ]; then
            echo "❌ ASC private key not found at $ASC_KEY_PATH"
            exit 1
          fi

          export ASC_KEY_IDENTIFIER_CLEAN ASC_ISSUER_ID_CLEAN ASC_KEY_PATH
            python3 -c "import json,os; payload={'key_id': os.environ['ASC_KEY_IDENTIFIER_CLEAN'], 'issuer_id': os.environ['ASC_ISSUER_ID_CLEAN'], 'key': open(os.environ['ASC_KEY_PATH'], 'r', encoding='utf-8').read(), 'in_house': False}; open('/tmp/asc_api_key.json', 'w', encoding='utf-8').write(json.dumps(payload))"

          echo "ASC_API_KEY_JSON=/tmp/asc_api_key.json" >> $GITHUB_ENV

      - name: Upload to TestFlight (Production Flow)
        run: |
          cd ios
          echo "🚀 Uploading build to TestFlight..."
          echo "📦 Production upload without TestFlight group distribution"
          bundle exec fastlane pilot upload \
            --ipa "$IPA_PATH" \
            --api_key_path "$ASC_API_KEY_JSON" \
            --skip_waiting_for_build_processing false \
            --distribute_external false \
            --changelog "Automated production build."

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "ver: ${{ needs.versioning.outputs.version_name }} (${{ needs.versioning.outputs.version_code }})" >> $GITHUB_STEP_SUMMARY
          echo "distribution: production flow (no external TestFlight groups)" >> $GITHUB_STEP_SUMMARY



