name: 🍎 iOS Production Release

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'Submit for App Store review after upload?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
      force_replace_review:
        description: 'Automatically replace an existing in-review submission (use with caution)'
        required: true
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.6'
  BUNDLE_ID: 'com.gavra013.gavra013ios'
  APP_ID: '6757114361'

jobs:
  build-and-submit:
    name: 🚀 Build & Submit to App Store
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPSTORE_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Auto-Bump Version
        id: version_bump
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          NEW_CODE=$((VERSION_CODE + 1))
          MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
          MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
          PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
          NEW_VERSION="${NEW_NAME}+${NEW_CODE}"
          sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "VERSION_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "📌 Bumped: $CURRENT → $NEW_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Codemagic CLI Tools
        run: pip install codemagic-cli-tools

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: |
          xcode-project use-profiles
          echo "--- ExportOptions.plist generated by use-profiles ---"
          cat $HOME/export_options.plist || echo "(not found at $HOME/export_options.plist)"

      - name: Update Info.plist
        run: |
          # Ensure Info.plist has the correct version
          plutil -replace CFBundleShortVersionString -string "${{ steps.version_bump.outputs.VERSION_NAME }}" ios/Runner/Info.plist
          plutil -replace CFBundleVersion -string "${{ steps.version_bump.outputs.VERSION_CODE }}" ios/Runner/Info.plist

      - name: Build iOS App
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version_bump.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version_bump.outputs.VERSION_CODE }} \
            --export-options-plist=$HOME/export_options.plist

      - name: List build outputs (for debugging)
        run: |
          echo "Listing build directory contents"
          ls -la build || true
          echo "Listing build/ios contents"
          ls -la build/ios || true
          echo "Listing possible ipa folder"
          ls -la build/ios/ipa || true
          echo "Searching for any .ipa files"
          find build -name '*.ipa' -print || true

      - name: Upload to App Store Connect
        run: |
          IPA=$(find build -name '*.ipa' | head -n1 || true)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found in build output. Build may have failed or path differs."
            exit 1
          fi
          echo "Uploading IPA: $IPA"
          app-store-connect publish --path "$IPA"
          echo "✅ Build uploaded to App Store Connect!"

      - name: Wait for build processing
        run: |
          echo "⏳ Waiting 5 minutes for Apple to process build..."
          sleep 300
          echo "✅ Build should be processed now"

      - name: Create version, link build and submit for review
        if: ${{ github.event.inputs.submit_for_review == 'true' }}
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          VERSION_NAME="${{ steps.version_bump.outputs.VERSION_NAME }}"
          BUILD_NUM="${{ steps.version_bump.outputs.VERSION_CODE }}"

          # ── 1. Generiši JWT ──────────────────────────────────────────
          ISSUED_AT=$(date +%s)
          EXPIRATION=$((ISSUED_AT + 1200))
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8
          HEADER=$(echo -n '{"alg":"ES256","kid":"'"$APP_STORE_CONNECT_KEY_IDENTIFIER"'","typ":"JWT"}' | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.read().encode()).rstrip(b'=').decode())")
          PAYLOAD=$(echo -n '{"iss":"'"$APP_STORE_CONNECT_ISSUER_ID"'","iat":'"$ISSUED_AT"',"exp":'"$EXPIRATION"',"aud":"appstoreconnect-v1"}' | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.read().encode()).rstrip(b'=').decode())")
          SIGN_INPUT="$HEADER.$PAYLOAD"
          SIGNATURE=$(echo -n "$SIGN_INPUT" | openssl dgst -sha256 -sign /tmp/asc_key.p8 -binary | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.buffer.read()).rstrip(b'=').decode())")
          JWT="$SIGN_INPUT.$SIGNATURE"
          rm -f /tmp/asc_key.p8
          echo "✅ JWT generated"

          # ── 2. Nađi ili kreiraj App Store verziju ────────────────────
          echo "🔍 Looking for App Store version $VERSION_NAME..."
          VERSIONS_RESP=$(curl -s \
            "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&limit=50" \
            -H "Authorization: Bearer $JWT")
          VERSION_ID=$(echo "$VERSIONS_RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          vn='$VERSION_NAME'
          items=d.get('data',[])
          match=[v for v in items if v['attributes'].get('versionString')==vn and v['attributes'].get('appStoreState')=='PREPARE_FOR_SUBMISSION']
          print(match[0]['id'] if match else '')
          " 2>/dev/null || echo "")

          if [ -z "$VERSION_ID" ]; then
            echo "➕ Creating new App Store version $VERSION_NAME..."
            CREATE_RESP=$(curl -s -X POST \
              "https://api.appstoreconnect.apple.com/v1/appStoreVersions" \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"data\":{\"type\":\"appStoreVersions\",\"attributes\":{\"versionString\":\"$VERSION_NAME\",\"platform\":\"IOS\",\"releaseType\":\"AFTER_APPROVAL\"},\"relationships\":{\"app\":{\"data\":{\"type\":\"apps\",\"id\":\"$APP_ID\"}}}}}")
            VERSION_ID=$(echo "$CREATE_RESP" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")
            if [ -z "$VERSION_ID" ]; then
              echo "❌ Could not create App Store version. Response:"
              echo "$CREATE_RESP"
              exit 1
            fi
            echo "✅ Created version ID: $VERSION_ID"
          else
            echo "✅ Found existing version ID: $VERSION_ID"
          fi

          # ── 3. Nađi build po build number ───────────────────────────
          echo "🔍 Looking for build number $BUILD_NUM..."
          BUILDS_RESP=$(curl -s \
            "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[version]=$BUILD_NUM&limit=5" \
            -H "Authorization: Bearer $JWT")
          BUILD_ID=$(echo "$BUILDS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d.get('data',[]); print(items[0]['id'] if items else '')" 2>/dev/null || echo "")

          if [ -z "$BUILD_ID" ]; then
            echo "⏳ Build not found yet, waiting 3 minutes..."
            sleep 180
            BUILDS_RESP=$(curl -s \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[version]=$BUILD_NUM&limit=5" \
              -H "Authorization: Bearer $JWT")
            BUILD_ID=$(echo "$BUILDS_RESP" | python3 -c "import sys,json; d=json.load(sys.stdin); items=d.get('data',[]); print(items[0]['id'] if items else '')" 2>/dev/null || echo "")
          fi

          if [ -z "$BUILD_ID" ]; then
            echo "❌ Build $BUILD_NUM not found in App Store Connect. Submit manually."
            exit 1
          fi
          echo "✅ Found build ID: $BUILD_ID"

          # ── 4. Linkuj build na verziju ───────────────────────────────
          echo "🔗 Linking build to version..."
          LINK_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\",\"relationships\":{\"build\":{\"data\":{\"type\":\"builds\",\"id\":\"$BUILD_ID\"}}}}}")
          echo "🔗 Link response HTTP: $LINK_CODE"

          # ── 5. Postavi What's New tekst ──────────────────────────────
          WHATSNEW_FILE="distribution/whatsnew/whatsnew-sr-RS"
          if [ -f "$WHATSNEW_FILE" ]; then
            WHATS_NEW=$(cat "$WHATSNEW_FILE")
            LOCS_RESP=$(curl -s \
              "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID/appStoreVersionLocalizations" \
              -H "Authorization: Bearer $JWT")
            LOC_ID=$(echo "$LOCS_RESP" | python3 -c "
          import sys,json
          d=json.load(sys.stdin)
          items=d.get('data',[])
          match=next((l for l in items if l['attributes'].get('locale') in ('sr-RS','en-US')), items[0] if items else None)
          print(match['id'] if match else '')
            " 2>/dev/null || echo "")
            if [ -n "$LOC_ID" ]; then
              curl -s -o /dev/null -X PATCH \
                "https://api.appstoreconnect.apple.com/v1/appStoreVersionLocalizations/$LOC_ID" \
                -H "Authorization: Bearer $JWT" \
                -H "Content-Type: application/json" \
                -d "{\"data\":{\"type\":\"appStoreVersionLocalizations\",\"id\":\"$LOC_ID\",\"attributes\":{\"whatsNew\":$(echo "$WHATS_NEW" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')}}}"
              echo "✅ What's New text set"
            fi
          fi

          # ── 6. Submit for review ─────────────────────────────────────
          echo "🚀 Creating review submission..."
          SUB_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissions" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"reviewSubmissions\",\"attributes\":{\"platform\":\"IOS\"},\"relationships\":{\"app\":{\"data\":{\"type\":\"apps\",\"id\":\"$APP_ID\"}}}}}")
          SUB_HTTP=$(echo "$SUB_RESP" | tail -1)
          SUB_BODY=$(echo "$SUB_RESP" | head -1)
          SUBMISSION_ID=$(echo "$SUB_BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")

          if [ -z "$SUBMISSION_ID" ]; then
            echo "❌ Failed to create review submission (HTTP $SUB_HTTP)"
            echo "$SUB_BODY"
            exit 1
          fi
          echo "✅ Review submission created: $SUBMISSION_ID"

          # Dodaj verziju u submission
          curl -s -o /dev/null -X POST \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissionItems" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"reviewSubmissionItems\",\"relationships\":{\"reviewSubmission\":{\"data\":{\"type\":\"reviewSubmissions\",\"id\":\"$SUBMISSION_ID\"}},\"appStoreVersion\":{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\"}}}}}"

          # Potvrdi submission
          CONFIRM_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissions/$SUBMISSION_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"reviewSubmissions\",\"id\":\"$SUBMISSION_ID\",\"attributes\":{\"submitted\":true}}}")

          if [ "$CONFIRM_CODE" = "200" ] || [ "$CONFIRM_CODE" = "204" ]; then
            echo "🎉 Successfully submitted $VERSION_NAME for App Store review!"
          else
            echo "⚠️ Submit confirm returned HTTP $CONFIRM_CODE — provjeri ručno u App Store Connect."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "ver: ${{ steps.version_bump.outputs.VERSION_NAME }} (${{ steps.version_bump.outputs.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY

