name: 🍎 iOS Production Release

on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: false
        default: true
        type: boolean
      version_name:
        description: 'Force version name (e.g. 6.0.120)'
        required: false
        default: ''
        type: string
      version_code:
        description: 'Force version code (e.g. 120)'
        required: false
        default: ''
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
        type: string
      support_url:
        description: 'Support URL (default: GitHub Pages)'
        required: false
        default: 'https://lakisa-code.github.io/gavra_android/'
        type: string
  workflow_call:
    inputs:
      git_ref:
        description: 'Git ref/sha to checkout (optional)'
        required: false
        type: string
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: false
        default: true
        type: boolean
      version_name:
        description: 'Force version name (e.g. 6.0.120)'
        required: false
        default: ''
        type: string
      version_code:
        description: 'Force version code (e.g. 120)'
        required: false
        default: ''
        type: string
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
        type: string
      support_url:
        description: 'Support URL (optional)'
        required: false
        default: 'https://lakisa-code.github.io/gavra_android/'
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.6'
  BUNDLE_ID: 'com.gavra013.gavra013ios'
  APP_ID: '6757114361'

jobs:
  build-and-submit:
    name: 🚀 Build & Submit to App Store
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPSTORE_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Deploy policy docs to GitHub Pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          publish_branch: gh-pages
          force_orphan: false
          commit_message: "docs: sync privacy/delete-account pages [skip ci]"

      - name: Auto-Bump Version
        id: version_bump
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          INPUT_VERSION_NAME="${{ inputs.version_name }}"
          INPUT_VERSION_CODE="${{ inputs.version_code }}"
          SHOULD_BUMP="${{ inputs.bump_version }}"
          if [ -z "$SHOULD_BUMP" ]; then
            SHOULD_BUMP="true"
          fi

          if [ -n "$INPUT_VERSION_NAME" ] && [ -n "$INPUT_VERSION_CODE" ]; then
            NEW_NAME="$INPUT_VERSION_NAME"
            NEW_CODE="$INPUT_VERSION_CODE"
            NEW_VERSION="${NEW_NAME}+${NEW_CODE}"
            sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            echo "VERSION_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
            echo "📌 Forced version: $CURRENT → $NEW_VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: set version to $NEW_VERSION [skip ci]"
              git push
            fi
          elif [ "$SHOULD_BUMP" = "true" ]; then
            NEW_CODE=$((VERSION_CODE + 1))
            MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
            MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
            PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)

            NEW_PATCH=$((PATCH + 1))
            # Handle minor carrier overflow (consistent with Android)
            # if [ $NEW_PATCH -ge 100 ]; then NEW_PATCH=0; MINOR=$((MINOR + 1)); fi

            NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
            NEW_VERSION="${NEW_NAME}+${NEW_CODE}"
            sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            echo "VERSION_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
            echo "📌 Bumped: $CURRENT → $NEW_VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
              git push
            fi
          else
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "📌 Bump disabled, using existing version: $CURRENT"
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Codemagic CLI Tools
        run: pip install codemagic-cli-tools

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: |
          xcode-project use-profiles
          echo "--- ExportOptions.plist generated by use-profiles ---"
          cat $HOME/export_options.plist || echo "(not found at $HOME/export_options.plist)"

      - name: Update Info.plist
        run: |
          # Ensure Info.plist has the correct version
          plutil -replace CFBundleShortVersionString -string "${{ steps.version_bump.outputs.VERSION_NAME }}" ios/Runner/Info.plist
          plutil -replace CFBundleVersion -string "${{ steps.version_bump.outputs.VERSION_CODE }}" ios/Runner/Info.plist

      - name: Build iOS App
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version_bump.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version_bump.outputs.VERSION_CODE }} \
            --export-options-plist=$HOME/export_options.plist

      - name: List build outputs (for debugging)
        run: |
          echo "Listing build directory contents"
          ls -la build || true
          echo "Listing build/ios contents"
          ls -la build/ios || true
          echo "Listing possible ipa folder"
          ls -la build/ios/ipa || true
          echo "Searching for any .ipa files"
          find build -name '*.ipa' -print || true

      - name: Upload to App Store Connect
        run: |
          IPA=$(find build -name '*.ipa' | head -n1 || true)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found in build output. Build may have failed or path differs."
            exit 1
          fi
          echo "Uploading IPA: $IPA"
          app-store-connect publish --path "$IPA"
          echo "✅ Build uploaded to App Store Connect!"

      - name: Wait for build processing
        run: |
          echo "⏳ Waiting 5 minutes for Apple to process build..."
          sleep 300
          echo "✅ Build should be processed now"

      - name: Set What's New automatically
        run: |
          VERSION_STRING="${{ steps.version_bump.outputs.VERSION_NAME }}"
          RELEASE_NOTES="${{ inputs.release_notes || github.event.inputs.release_notes }}"
          SUPPORT_URL="${{ inputs.support_url || 'https://lakisa-code.github.io/gavra_android/' }}"
          
          if [ -z "$RELEASE_NOTES" ]; then
            RELEASE_NOTES="Ispravke grešaka i poboljšanja performansi."
          fi

          # UTF-8 Guard for Release Notes
          echo "$RELEASE_NOTES" | iconv -f UTF-8 -t UTF-8 > /dev/null
          if [ $? -ne 0 ]; then
            echo "❌ Error: release_notes contains invalid UTF-8 characters!"
            exit 1
          fi

          echo "📝 Setting metadata for iOS version $VERSION_STRING (Support URL: $SUPPORT_URL)"

          VERSIONS_JSON_FILE=$(mktemp)
          VERSION_ID=""

          # 1) Pokušaj da nađeš tačnu verziju (Apple ume da kasni dok je build u obradi)
          # Povećano na 15 pokušaja sa dužim čekanjem jer Apple nekada jako dugo procesira
          for ATTEMPT in $(seq 1 15); do
            app-store-connect apps app-store-versions "$APP_ID" \
              --platform IOS \
              --version-string "$VERSION_STRING" \
              --json > "$VERSIONS_JSON_FILE" || true

            VERSION_ID=$(python3 -c "import json,sys; data=json.load(open(sys.argv[1], encoding='utf-8')); items=(data.get('data') if isinstance(data,dict) and isinstance(data.get('data'),list) else (data.get('appStoreVersions') if isinstance(data,dict) and isinstance(data.get('appStoreVersions'),list) else (data if isinstance(data,list) else []))); print(next((i.get('id') for i in items if isinstance(i,dict) and i.get('id')), ''))" "$VERSIONS_JSON_FILE")

            if [ -n "$VERSION_ID" ]; then
              echo "✅ Found exact App Store version: $VERSION_STRING ($VERSION_ID)"
              break
            fi

            if [ "$ATTEMPT" -lt 15 ]; then
              echo "⏳ Version $VERSION_STRING not visible yet (attempt $ATTEMPT/15), waiting 45s..."
              sleep 45
            fi
          done

          # 2) Fallback: ako tačna verzija još ne postoji, uzmi editabilnu App Store verziju
          if [ -z "$VERSION_ID" ]; then
             echo "⚠️ Version $VERSION_STRING not found, falling back to editable version..."
             VERSION_ID=$(app-store-connect apps app-store-versions "$APP_ID" --platform IOS --state PREPARE_FOR_SUBMISSION --json | python3 -c "import json,sys; data=json.load(sys.stdin); items=(data.get('data') if isinstance(data,dict) and isinstance(data.get('data'),list) else (data.get('appStoreVersions') if isinstance(data,dict) and isinstance(data.get('appStoreVersions'),list) else (data if isinstance(data,list) else []))); print(next((i['id'] for i in items if i.get('id')), ''))")
          fi

          if [ -z "$VERSION_ID" ]; then
            echo "❌ Could not find an App Store version to update."
            exit 1
          fi

          # 3) Ažuriraj lokalizaciju i Support URL
          LOCALIZATION_JSON=$(mktemp)
          app-store-connect app-store-versions app-store-version-localizations "$VERSION_ID" --json > "$LOCALIZATION_JSON" || true

          # Uzmi ID postojeće lokalizacije (npr. en-US)
          LOCALIZATION_ID=$(python3 -c "import json,sys; data=json.load(open(sys.argv[1], encoding='utf-8')); items=(data.get('data') if isinstance(data,dict) and isinstance(data.get('data'),list) else (data.get('appStoreVersionLocalizations') if isinstance(data,dict) and isinstance(data.get('appStoreVersionLocalizations'),list) else (data if isinstance(data,list) else []))); print(next((i['id'] for i in items if i.get('id')), ''))" "$LOCALIZATION_JSON")

          if [ -n "$LOCALIZATION_ID" ]; then
            echo "✅ Updating existing localization ($LOCALIZATION_ID) with What's New and Support URL"
            app-store-connect app-store-version-localizations modify "$LOCALIZATION_ID" \
              --whats-new "$RELEASE_NOTES" \
              --support-url "$SUPPORT_URL"
          else
            echo "ℹ️ No localization found; creating en-US localization"
            app-store-connect app-store-version-localizations create "$VERSION_ID" en-US \
              --whats-new "$RELEASE_NOTES" \
              --support-url "$SUPPORT_URL"
          fi

          echo "✅ Metadata updated successfully"

      - name: Clear active App Review submissions
        run: |
          echo "🧹 Checking for active review submissions..."

          ACTIVE_JSON=$(mktemp)
          app-store-connect apps list-review-submissions "$APP_ID" \
            --platform IOS \
            --review-submission-state WAITING_FOR_REVIEW IN_REVIEW READY_FOR_REVIEW UNRESOLVED_ISSUES \
            --json > "$ACTIVE_JSON"

          ACTIVE_COUNT=$(python3 -c "import json,sys; data=json.load(open(sys.argv[1], encoding='utf-8')); items=(data.get('data') if isinstance(data,dict) and isinstance(data.get('data'),list) else (data.get('reviewSubmissions') if isinstance(data,dict) and isinstance(data.get('reviewSubmissions'),list) else (data if isinstance(data,list) else []))); print(len(items))" "$ACTIVE_JSON")

          if [ "$ACTIVE_COUNT" -gt 0 ]; then
            echo "ℹ️ Found $ACTIVE_COUNT active review submission(s). Canceling..."
            app-store-connect apps cancel-review-submissions "$APP_ID" \
              --platform IOS \
              --review-submission-state WAITING_FOR_REVIEW IN_REVIEW READY_FOR_REVIEW UNRESOLVED_ISSUES \
              --json || true
            echo "⏳ Waiting 20s for cancellation to propagate..."
            sleep 20
          else
            echo "✅ No active review submissions found."
          fi

      - name: Auto-submit to App Review
        run: |
          echo "🚀 Auto-submit to App Review started..."
          MAX_RETRIES=12
          RETRY_DELAY=60
          ATTEMPT=1

          while [ "$ATTEMPT" -le "$MAX_RETRIES" ]; do
            echo "[Attempt $ATTEMPT/$MAX_RETRIES] Creating review submission..."
            OUTPUT=$(app-store-connect review-submissions create "$APP_ID" --platform IOS --json 2>&1)
            EXIT_CODE=$?

            if [ "$EXIT_CODE" -eq 0 ]; then
              echo "$OUTPUT"
              echo "✅ Submitted to App Review successfully"
              break
            fi

            echo "$OUTPUT"

            if echo "$OUTPUT" | grep -Eiq "already|in review|waiting for review|submitted"; then
              echo "ℹ️ Existing review submission detected. Trying to cancel and retry..."
              app-store-connect apps cancel-review-submissions "$APP_ID" \
                --platform IOS \
                --review-submission-state WAITING_FOR_REVIEW IN_REVIEW READY_FOR_REVIEW UNRESOLVED_ISSUES \
                --json || true
              sleep 20
            fi

            if [ "$ATTEMPT" -eq "$MAX_RETRIES" ]; then
              echo "❌ Failed to auto-submit to App Review after $MAX_RETRIES attempts."
              exit 1
            fi

            echo "⏳ Build may still be processing. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
            ATTEMPT=$((ATTEMPT + 1))
          done

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "ver: ${{ steps.version_bump.outputs.VERSION_NAME }} (${{ steps.version_bump.outputs.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY
          echo "review: auto-submit enabled" >> $GITHUB_STEP_SUMMARY

      - name: Cleanup keychain
        if: always()
        run: keychain cleanup

