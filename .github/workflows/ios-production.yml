name: 🍎 iOS Production Release

on:
  workflow_dispatch:
    inputs: {}
  workflow_call:
    inputs:
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: false
        default: true
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.0'
  BUNDLE_ID: 'com.gavra013.gavra013ios'
  APP_ID: '6757114361'

jobs:
  build-and-submit:
    name: 🚀 Build & Submit to App Store
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APP_STORE_CONNECT_KEY_IDENTIFIER }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Auto-Bump Version
        id: version_bump
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          SHOULD_BUMP="${{ inputs.bump_version }}"
          if [ -z "$SHOULD_BUMP" ]; then
            SHOULD_BUMP="true"
          fi

          if [ "$SHOULD_BUMP" = "true" ]; then
            NEW_CODE=$((VERSION_CODE + 1))
            MAJOR=$(echo "$VERSION_NAME" | cut -d'.' -f1)
            MINOR=$(echo "$VERSION_NAME" | cut -d'.' -f2)
            PATCH=$(echo "$VERSION_NAME" | cut -d'.' -f3)
            NEW_PATCH=$((PATCH + 1))
            NEW_NAME="${MAJOR}.${MINOR}.${NEW_PATCH}"
            NEW_VERSION="${NEW_NAME}+${NEW_CODE}"
            sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
            echo "VERSION_NAME=$NEW_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
            echo "📌 Bumped: $CURRENT → $NEW_VERSION"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add pubspec.yaml
            if git diff --staged --quiet; then
              echo "No changes to commit."
            else
              git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
              git push
            fi
          else
            echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
            echo "VERSION_CODE=$VERSION_CODE" >> $GITHUB_OUTPUT
            echo "📌 Bump disabled, using existing version: $CURRENT"
          fi

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Codemagic CLI Tools
        run: pip install codemagic-cli-tools

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Setup keychain
        run: keychain initialize

      - name: Prepare signing keys
        env:
          CERT_KEY_CONTENT: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
          ASC_KEY_CONTENT: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
          ASC_KEY_B64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          if [ -z "$APP_STORE_CONNECT_KEY_IDENTIFIER" ]; then
            echo "❌ Missing APP_STORE_CONNECT_KEY_IDENTIFIER"
            exit 1
          fi

          mkdir -p ~/.private_keys
          printf '%s' "$CERT_KEY_CONTENT" > /tmp/certificate_private_key.pem

          ASC_KEY_PATH="${HOME}/.private_keys/AuthKey_${APP_STORE_CONNECT_KEY_IDENTIFIER}.p8"
          if [ -n "$ASC_KEY_CONTENT" ]; then
            printf '%s' "$ASC_KEY_CONTENT" > "$ASC_KEY_PATH"
          elif [ -n "$ASC_KEY_B64" ]; then
            printf '%s' "$ASC_KEY_B64" | base64 --decode > "$ASC_KEY_PATH"
          else
            echo "❌ Missing APP_STORE_CONNECT_PRIVATE_KEY or APP_STORE_CONNECT_PRIVATE_KEY_BASE64"
            exit 1
          fi

          echo "Cert key first line: $(head -1 /tmp/certificate_private_key.pem)"
          echo "Cert key size: $(wc -c < /tmp/certificate_private_key.pem)"
          # Export env vars via GITHUB_ENV so all subsequent steps use file paths
          echo "CERTIFICATE_PRIVATE_KEY=@file:/tmp/certificate_private_key.pem" >> $GITHUB_ENV
          echo "APP_STORE_CONNECT_PRIVATE_KEY=@file:${ASC_KEY_PATH}" >> $GITHUB_ENV

      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: |
          xcode-project use-profiles
          echo "--- ExportOptions.plist generated by use-profiles ---"
          cat $HOME/export_options.plist || echo "(not found at $HOME/export_options.plist)"

      - name: Update Info.plist
        run: |
          # Ensure Info.plist has the correct version
          plutil -replace CFBundleShortVersionString -string "${{ steps.version_bump.outputs.VERSION_NAME }}" ios/Runner/Info.plist
          plutil -replace CFBundleVersion -string "${{ steps.version_bump.outputs.VERSION_CODE }}" ios/Runner/Info.plist

      - name: Build iOS App
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version_bump.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version_bump.outputs.VERSION_CODE }} \
            --export-options-plist=$HOME/export_options.plist

      - name: List build outputs (for debugging)
        run: |
          echo "Listing build directory contents"
          ls -la build || true
          echo "Listing build/ios contents"
          ls -la build/ios || true
          echo "Listing possible ipa folder"
          ls -la build/ios/ipa || true
          echo "Searching for any .ipa files"
          find build -name '*.ipa' -print || true

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "ver: ${{ steps.version_bump.outputs.VERSION_NAME }} (${{ steps.version_bump.outputs.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY

