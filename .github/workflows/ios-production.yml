name: 🍎 iOS Production Release

on:
  workflow_dispatch:
    inputs:
      submit_for_review:
        description: 'Submit for App Store review after upload?'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      release_notes:
        description: 'Release notes (optional)'
        required: false
        default: ''
      force_replace_review:
        description: 'Automatically replace an existing in-review submission (use with caution)'
        required: true
        default: 'false'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.6'
  BUNDLE_ID: 'com.gavra013.gavra013ios'
  APP_ID: '6757114361'

jobs:
  build-and-submit:
    name: 🚀 Build & Submit to App Store
    runs-on: macos-latest
    env:
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
      APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPSTORE_KEY_ID }}
      APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
      CERTIFICATE_PRIVATE_KEY: ${{ secrets.CERTIFICATE_PRIVATE_KEY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Auto-Bump Version
        id: version_bump
        run: |
          CURRENT=$(grep "^version:" pubspec.yaml | sed 's/version: //')
          VERSION_NAME=$(echo "$CURRENT" | cut -d'+' -f1)
          VERSION_CODE=$(echo "$CURRENT" | cut -d'+' -f2)
          NEW_CODE=$((VERSION_CODE + 1))
          NEW_VERSION="${VERSION_NAME}+${NEW_CODE}"
          sed -i '' "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml
          echo "VERSION_NAME=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$NEW_CODE" >> $GITHUB_OUTPUT
          echo "📌 Bumped: $CURRENT → $NEW_VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump build number to $NEW_CODE [skip ci]"
          git push

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Install Codemagic CLI Tools
        run: pip install codemagic-cli-tools

      - name: Create .env file
        run: echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

      - name: Create GoogleService-Info.plist
        run: echo "${{ secrets.IOS_GOOGLE_SERVICES_PLIST }}" > ios/Runner/GoogleService-Info.plist

      - name: Get dependencies
        run: flutter pub get

      - name: Setup keychain
        run: keychain initialize

      - name: Fetch signing files
        run: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --create

      - name: Setup certificates
        run: keychain add-certificates

      - name: Setup code signing
        run: |
          xcode-project use-profiles
          echo "--- ExportOptions.plist generated by use-profiles ---"
          cat $HOME/export_options.plist || echo "(not found at $HOME/export_options.plist)"

      - name: Update Info.plist
        run: |
          # Ensure Info.plist has the correct version
          plutil -replace CFBundleShortVersionString -string "${{ steps.version_bump.outputs.VERSION_NAME }}" ios/Runner/Info.plist
          plutil -replace CFBundleVersion -string "${{ steps.version_bump.outputs.VERSION_CODE }}" ios/Runner/Info.plist

      - name: Build iOS App
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version_bump.outputs.VERSION_NAME }} \
            --build-number=${{ steps.version_bump.outputs.VERSION_CODE }} \
            --export-options-plist=$HOME/export_options.plist

      - name: List build outputs (for debugging)
        run: |
          echo "Listing build directory contents"
          ls -la build || true
          echo "Listing build/ios contents"
          ls -la build/ios || true
          echo "Listing possible ipa folder"
          ls -la build/ios/ipa || true
          echo "Searching for any .ipa files"
          find build -name '*.ipa' -print || true

      - name: Upload to App Store Connect
        run: |
          IPA=$(find build -name '*.ipa' | head -n1 || true)
          if [ -z "$IPA" ]; then
            echo "❌ No .ipa found in build output. Build may have failed or path differs."
            exit 1
          fi
          echo "Uploading IPA: $IPA"
          app-store-connect publish --path "$IPA"
          echo "✅ Build uploaded to App Store Connect!"

      - name: Wait for build processing
        run: |
          echo "⏳ Waiting 5 minutes for Apple to process build..."
          sleep 300
          echo "✅ Build should be processed now"

      - name: Create or find App Store version
        run: |
          VERSION_NAME="${{ steps.version_bump.outputs.VERSION_NAME }}"
          echo "🔍 Looking for existing App Store version $VERSION_NAME in PREPARE_FOR_SUBMISSION..."

          # Pokušaj naći postojeću verziju u PREPARE_FOR_SUBMISSION
          VERSION_ID=$(app-store-connect app-store-versions list \
            --app-id "$APP_ID" \
            --json 2>/dev/null | python3 << 'PYEOF'
import sys, json
data = json.load(sys.stdin)
vers = [v for v in data if v.get('versionString') == '$VERSION_NAME' and v.get('appStoreState') == 'PREPARE_FOR_SUBMISSION']
print(vers[0]['id'] if vers else '')
PYEOF
)

          if [ -z "$VERSION_ID" ]; then
            echo "➕ Creating new App Store version $VERSION_NAME..."
            VERSION_ID=$(app-store-connect app-store-versions create \
              --app-id "$APP_ID" \
              --version-string "$VERSION_NAME" \
              --platform IOS \
              --release-type AFTER_APPROVAL \
              --json 2>/dev/null | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])" 2>/dev/null || echo "")
          fi

          if [ -z "$VERSION_ID" ]; then
            echo "❌ Could not create or find App Store version. Exiting."
            exit 1
          fi

          echo "✅ Using App Store version ID: $VERSION_ID"
          echo "VERSION_ID=$VERSION_ID" >> $GITHUB_ENV

      - name: Set What's New text
        run: |
          WHATSNEW_FILE="distribution/whatsnew/whatsnew-sr-RS"
          if [ ! -f "$WHATSNEW_FILE" ]; then
            echo "⚠️ What's New file not found, skipping."
            exit 0
          fi
          WHATS_NEW=$(cat "$WHATSNEW_FILE")
          echo "📝 Setting What's New text..."

          # Dohvati localization ID za sr-RS ili en-US
          LOC_ID=$(app-store-connect app-store-version-localizations list \
            --app-store-version-id "$VERSION_ID" \
            --json 2>/dev/null | python3 << 'PYEOF'
import sys, json
data = json.load(sys.stdin)
loc = next((l for l in data if l.get('locale') in ('sr-RS', 'en-US')), data[0] if data else None)
print(loc['id'] if loc else '')
PYEOF
)

          if [ -z "$LOC_ID" ]; then
            echo "⚠️ Could not find localization ID, skipping What's New."
            exit 0
          fi

          app-store-connect app-store-version-localizations modify \
            "$LOC_ID" \
            --whats-new "$WHATS_NEW" || echo "⚠️ Could not set What's New text."
          echo "✅ What's New text set!"

      - name: Find and link build to version
        id: link_build
        run: |
          BUILD_NUM="${{ steps.version_bump.outputs.VERSION_CODE }}"
          echo "🔍 Looking for build $BUILD_NUM..."

          # Try to find the build
          BUILD_ID=$(app-store-connect builds list \
            --app-id "$APP_ID" \
            --build-version-number "$BUILD_NUM" \
            --json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['id'] if data else '')" 2>/dev/null || echo "")

          if [ -z "$BUILD_ID" ]; then
             echo "⏳ Build not found immediately. Waiting more..."
             sleep 120
             BUILD_ID=$(app-store-connect builds list \
              --app-id "$APP_ID" \
              --build-version-number "$BUILD_NUM" \
              --json 2>/dev/null | python3 -c "import sys,json; data=json.load(sys.stdin); print(data[0]['id'] if data else '')" 2>/dev/null || echo "")
          fi

          if [ -n "$BUILD_ID" ]; then
            echo "✅ Found build ID: $BUILD_ID"
            echo "BUILD_ID=$BUILD_ID" >> $GITHUB_OUTPUT
            
            # Link build to version
            echo "🔗 Linking build to version (id: $VERSION_ID)..."
            app-store-connect app-store-versions modify \
              --id "$VERSION_ID" \
              --build-id "$BUILD_ID" || echo "⚠️ Warning: Linking failed (maybe version string mismatch or already linked)"
          else
            echo "❌ Could not find build $BUILD_NUM in App Store Connect yet."
            echo "⚠️ Proceeding without linking/submitting."
            echo "BUILD_ID=" >> $GITHUB_OUTPUT
          fi

      - name: Submit for review (optional)
        if: ${{ github.event.inputs.submit_for_review == 'true' }}
        env:
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APPSTORE_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_IDENTIFIER: ${{ secrets.APPSTORE_KEY_ID }}
          APP_STORE_CONNECT_PRIVATE_KEY: ${{ secrets.APPSTORE_API_KEY_P8 }}
        run: |
          if [ -z "${{ steps.link_build.outputs.BUILD_ID }}" ]; then
            echo "❌ No build ID found to submit; skipping submission."
            exit 0
          fi
          echo "🚀 Submitting for App Store review via new API..."

          # Generiši JWT token za App Store Connect API
          ISSUED_AT=$(date +%s)
          EXPIRATION=$((ISSUED_AT + 1200))
          ISSUER_ID="$APP_STORE_CONNECT_ISSUER_ID"
          KEY_ID="$APP_STORE_CONNECT_KEY_IDENTIFIER"

          # Napiši private key u fajl
          echo "$APP_STORE_CONNECT_PRIVATE_KEY" > /tmp/asc_key.p8

          HEADER=$(echo -n '{"alg":"ES256","kid":"'"$KEY_ID"'","typ":"JWT"}' | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.read().encode()).rstrip(b'=').decode())")
          PAYLOAD=$(echo -n '{"iss":"'"$ISSUER_ID"'","iat":'"$ISSUED_AT"',"exp":'"$EXPIRATION"',"aud":"appstoreconnect-v1"}' | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.read().encode()).rstrip(b'=').decode())")
          SIGN_INPUT="$HEADER.$PAYLOAD"
          SIGNATURE=$(echo -n "$SIGN_INPUT" | openssl dgst -sha256 -sign /tmp/asc_key.p8 -binary | python3 -c "import sys,base64; print(base64.urlsafe_b64encode(sys.stdin.buffer.read()).rstrip(b'=').decode())")
          JWT="$SIGN_INPUT.$SIGNATURE"
          rm -f /tmp/asc_key.p8

          # Kreiraj reviewSubmission
          SUBMISSION_RESP=$(curl -s -w "\n%{http_code}" -X POST \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissions" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"reviewSubmissions\",\"attributes\":{\"platform\":\"IOS\"},\"relationships\":{\"app\":{\"data\":{\"type\":\"apps\",\"id\":\"$APP_ID\"}}}}}")
          HTTP_CODE=$(echo "$SUBMISSION_RESP" | tail -1)
          BODY=$(echo "$SUBMISSION_RESP" | head -1)
          SUBMISSION_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['data']['id'])" 2>/dev/null || echo "")

          if [ -z "$SUBMISSION_ID" ]; then
            echo "❌ Failed to create review submission (HTTP $HTTP_CODE)"
            echo "$BODY"
            exit 0
          fi
          echo "✅ Review submission created: $SUBMISSION_ID"

          # Dodaj App Store verziju u submission
          curl -s -o /dev/null -X POST \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissionItems" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"reviewSubmissionItems\",\"relationships\":{\"reviewSubmission\":{\"data\":{\"type\":\"reviewSubmissions\",\"id\":\"$SUBMISSION_ID\"}},\"appStoreVersion\":{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\"}}}}}"

          # Pošalji na review (confirm)
          CONFIRM_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PATCH \
            "https://api.appstoreconnect.apple.com/v1/reviewSubmissions/$SUBMISSION_ID" \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d '{"data":{"type":"reviewSubmissions","id":"'"$SUBMISSION_ID"'","attributes":{"submitted":true}}}')

          if [ "$CONFIRM_CODE" = "200" ] || [ "$CONFIRM_CODE" = "204" ]; then
            echo "🎉 Successfully submitted for App Store review!"
          else
            echo "⚠️ Submit confirm returned HTTP $CONFIRM_CODE — provjeri ručno u App Store Connect."
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 iOS Build Complete!" >> $GITHUB_STEP_SUMMARY
          echo "ver: ${{ steps.version_bump.outputs.VERSION_NAME }} (${{ steps.version_bump.outputs.VERSION_CODE }})" >> $GITHUB_STEP_SUMMARY

