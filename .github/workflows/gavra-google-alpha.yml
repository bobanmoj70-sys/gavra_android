name: 🔒 Google Play Closed Testing

# Upload na Google Play Closed Testing (Alpha track)
on:
  workflow_dispatch:
    inputs:
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: true
        default: 'true'
        type: boolean
  workflow_call:
    inputs:
      git_ref:
        description: 'Git Ref to checkout (optional)'
        required: false
        type: string
      bump_version:
        description: 'Auto-bump version in pubspec.yaml?'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

env:
  FLUTTER_VERSION: '3.35.6'

jobs:
  build-and-upload:
    name: 🚀 Build & Upload to Google Play
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.git_ref || github.ref }}

      - name: Auto-Bump Version
        if: ${{ inputs.bump_version == true }}
        shell: bash
        run: |
          # Read version from pubspec.yaml
          LINE=$(grep "^version: " pubspec.yaml)
          VERSION_PART=$(echo "$LINE" | sed 's/version: //g' | cut -d+ -f1)
          BUILD_PART=$(echo "$LINE" | sed 's/.*+//g')

          # Split version into major.minor.patch
          IFS='.' read -r -a parts <<< "$VERSION_PART"
          MAJOR="${parts[0]}"
          MINOR="${parts[1]}"
          PATCH="${parts[2]}"

          # Increment Patch and Build (Patch + 1, Build + 1)
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD_PART + 1))

          NEW_VERSION="$MAJOR.$MINOR.$NEW_PATCH+$NEW_BUILD"
          echo "[INFO] Bumping version: $VERSION_PART+$BUILD_PART -> $NEW_VERSION"

          # Update file using sed (inplace)
          sed -i "s/^version: .*/version: $NEW_VERSION/" pubspec.yaml

          # Git commit and push
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add pubspec.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Auto-bump version [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Version bumped and pushed."
          fi

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'

      - name: Prepare secrets (Linux)
        run: |
          # 1. Restore Keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/gavra-release-key-production.keystore
          
          # 2. Create key.properties
          echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}" > android/key.properties
          echo "keyPassword=${{ secrets.KEY_PASSWORD }}" >> android/key.properties
          echo "keyAlias=${{ secrets.KEY_ALIAS }}" >> android/key.properties
          echo "storeFile=gavra-release-key-production.keystore" >> android/key.properties

          # 3. Restore Google Play JSON
          echo "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON_BASE64 }}" | base64 --decode > android/google-service-account.json

          # 4. Restore AgConnect (Huawei) - Required for build even if not releasing to Huawei
          mkdir -p android/app
          echo "${{ secrets.AGC_BASE64 }}" | base64 -d > android/app/agconnect-services.json

          # 5. Restore .env file
          echo "${{ secrets.ENV_FILE_CONTENT }}" > .env

          # 6. Restore google-services.json
          echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 -d > android/app/google-services.json

      - name: 🛡️ Verify Keystore (Fail Fast)
        env:
           KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "Verifying Keystore integrity..."
          KEYSTORE_PATH="android/app/gavra-release-key-production.keystore"
          if [ -f "$KEYSTORE_PATH" ]; then
            SIZE=$(stat -c%s "$KEYSTORE_PATH")
            echo "Keystore size: $SIZE bytes"
            
            if [ "$SIZE" -lt 100 ]; then
              echo "Keystore is too small! Likely corrupted."
              exit 1
            fi
            
            # Verify with keytool
            keytool -list -v -keystore "$KEYSTORE_PATH" -storepass "$KEYSTORE_PASSWORD"
            if [ $? -ne 0 ]; then
              echo "Keytool verification FAILED! Your KEYSTORE_BASE64 secret is likely invalid or corrupted."
              exit 1
            fi
            echo "✅ Keystore verification PASSED."
          else
             echo "Keystore file not found!"
             exit 1
          fi

      - name: Get dependencies
        run: flutter pub get

      - name: Get version info
        id: version
        shell: bash
        run: |
          if [ -n "$version_name" ]; then
            VER_NAME="$version_name"
            VER_CODE="$version_code"
          else
            VER_NAME=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | cut -d+ -f1)
            VER_CODE=$(grep '^version:' pubspec.yaml | sed 's/.*+//g')
          fi
          echo "VERSION_NAME=$VER_NAME" >> $GITHUB_OUTPUT
          echo "VERSION_CODE=$VER_CODE" >> $GITHUB_OUTPUT
          echo "[INFO] Building v$VER_NAME ($VER_CODE)"

      - name: Build AAB
        run: |
          flutter build appbundle --release --build-name=${{ steps.version.outputs.VERSION_NAME }} --build-number=${{ steps.version.outputs.VERSION_CODE }}

      - name: Upload to Google Play (Closed Testing)
        uses: r0adkll/upload-google-play@v1.1.2
        with:
          serviceAccountJson: android/google-service-account.json
          packageName: com.gavra013.gavra_android
          releaseFiles: build/app/outputs/bundle/release/app-release.aab # Linux/Unix path
          track: alpha # Closed Testing
          status: completed
          releaseName: "v${{ steps.version.outputs.VERSION_NAME }}"
          whatsNewDirectory: distribution/whatsnew

      - name: Update Store Listing
        run: |
          pip install cryptography --quiet
          PACKAGE="com.gavra013.gavra_android"
          JSON_KEY="android/google-service-account.json"

          # Dohvati access token
          TOKEN=$(python3 - <<'PYEOF'
          import json, time, base64, urllib.request, urllib.parse
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import padding

          with open("android/google-service-account.json") as f:
              sa = json.load(f)

          now = int(time.time())
          header = base64.urlsafe_b64encode(json.dumps({"alg":"RS256","typ":"JWT"}).encode()).rstrip(b"=").decode()
          claim = base64.urlsafe_b64encode(json.dumps({
              "iss": sa["client_email"],
              "scope": "https://www.googleapis.com/auth/androidpublisher",
              "aud": "https://oauth2.googleapis.com/token",
              "iat": now, "exp": now + 3600
          }).encode()).rstrip(b"=").decode()

          msg = f"{header}.{claim}".encode()
          key = serialization.load_pem_private_key(sa["private_key"].encode(), password=None)
          sig = base64.urlsafe_b64encode(key.sign(msg, padding.PKCS1v15(), hashes.SHA256())).rstrip(b"=").decode()
          jwt = f"{header}.{claim}.{sig}"

          data = urllib.parse.urlencode({"grant_type":"urn:ietf:params:oauth:grant-type:jwt-bearer","assertion":jwt}).encode()
          req = urllib.request.Request("https://oauth2.googleapis.com/token", data=data)
          resp = json.loads(urllib.request.urlopen(req).read())
          print(resp["access_token"])
          PYEOF
          )

          BASE_URL="https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PACKAGE"

          # Otvori edit
          EDIT_ID=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE_URL/edits" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "[INFO] Edit ID: $EDIT_ID"

          # Ažuriraj sr-RS listing
          TITLE=$(cat distribution/store_listing/sr-RS/title.txt)
          SHORT=$(cat distribution/store_listing/sr-RS/short_description.txt)
          FULL=$(cat distribution/store_listing/sr-RS/full_description.txt)

          curl -s -X PATCH \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            "$BASE_URL/edits/$EDIT_ID/listings/sr-RS" \
            -d "{\"title\": $(echo "$TITLE" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                 \"shortDescription\": $(echo "$SHORT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))'),
                 \"fullDescription\": $(echo "$FULL" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read().strip()))')}"

          echo "[INFO] sr-RS listing updated"

          # Commituj edit
          COMMIT_RESP=$(curl -s -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "$BASE_URL/edits/$EDIT_ID:commit")
          echo "[INFO] Commit response: $COMMIT_RESP"
          echo "✅ Store Listing updated successfully"

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: google-play-aab-${{ steps.version.outputs.VERSION_CODE }}
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 30

      - name: Summary
        run: |
          echo "## ✅ Google Play Upload Complete!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.VERSION_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "**Build:** ${{ steps.version.outputs.VERSION_CODE }}" >> $GITHUB_STEP_SUMMARY
          echo "**Track:** Closed Testing (Alpha)" >> $GITHUB_STEP_SUMMARY

      - name: Update version in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | sed 's/version: //g' | cut -d+ -f1)
          # Dohvati trenutni latest_version (prethodna verzija) — ona postaje novi min_version
          PREV_VERSION=$(curl -s \
            "$SUPABASE_URL/rest/v1/v2_app_settings?id=eq.global&select=latest_version" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            | grep -o '"latest_version":"[^"]*"' | cut -d'"' -f4)
          # Fallback: ako nema prethodne verzije, koristi novu (ne blokira nikoga)
          MIN_VERSION=${PREV_VERSION:-$VERSION}
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X PATCH \
            "$SUPABASE_URL/rest/v1/v2_app_settings?id=eq.global" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{\"latest_version\": \"$VERSION\", \"min_version\": \"$MIN_VERSION\", \"updated_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}")
          if [ "$RESPONSE" = "204" ]; then
            echo "Supabase updated: latest_version=$VERSION min_version=$MIN_VERSION"
          else
            echo "Supabase update failed (HTTP $RESPONSE)"
            exit 1
          fi