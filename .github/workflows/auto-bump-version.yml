name: 🔢 Auto Bump Version (Push)

on:
  push:
    branches:
      - main
    paths-ignore:
      - pubspec.yaml

permissions:
  contents: write

jobs:
  bump-version:
    name: 🔢 Bump pubspec build number
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Bump pubspec build
        shell: pwsh
        run: |
          ./scripts/bump-pubspec.ps1 -PatchInc 0 -BuildInc 1

      - name: Commit and push bump
        run: |
          if git diff --quiet pubspec.yaml; then
            echo "No pubspec change detected, skipping."
            exit 0
          fi

          git add pubspec.yaml
          git commit -m "chore: auto bump build number [skip ci]"
          git push origin HEAD:${{ github.ref_name }}