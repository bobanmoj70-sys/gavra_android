name: Extract Secrets
on: workflow_dispatch
jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - name: Write Secrets
        env:
          IOS_ENV: ${{ secrets.IOS_ENV }}
          CERTIFICATE_PRIVATE_KEY_BASE64: ${{ secrets.CERTIFICATE_PRIVATE_KEY_BASE64 }}
          APP_STORE_CONNECT_PRIVATE_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY_BASE64 }}
        run: |
          echo "$IOS_ENV" > IOS_ENV.txt
          echo "$CERTIFICATE_PRIVATE_KEY_BASE64" > CERTIFICATE_PRIVATE_KEY_BASE64.txt
          echo "$APP_STORE_CONNECT_PRIVATE_KEY_BASE64" > APP_STORE_CONNECT_PRIVATE_KEY_BASE64.txt
          zip -P "gavra2026" extracted_secrets.zip *.txt
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: extracted-secrets
          path: extracted_secrets.zip