name: gavra_android
description: Gavra 013 - Aplikacija zatvorenog tipa za organizaciju polazaka

version: 6.0.119+503

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_dotenv: ^5.1.0
  intl: ^0.20.2
  flutter_localizations:
    sdk: flutter
  supabase_flutter: ^2.12.0
  firebase_core: ^3.15.2
  firebase_messaging: ^15.2.10
  flutter_local_notifications: ^16.0.0
  fl_chart: ^0.68.0
  # Legacy push provider references removed - using FCM + Huawei Push only
  # Huawei Push plugin - za notifikacije
  google_api_availability: ^5.0.0
  http: ^1.2.1
  package_info_plus: ^8.0.0
  url_launcher: ^6.1.0
  logger: ^2.6.0
  flutter_map: ^7.0.0
  latlong2: ^0.9.1
  audioplayers: ^6.1.0
  flutter_typeahead: ^5.2.0
  async: ^2.11.0
  path_provider: ^2.1.5
  open_filex: ^4.0.0
  permission_handler: ^11.0.1
  dropdown_button2: ^2.3.9
  flutter_secure_storage: ^10.0.0
  wakelock_plus: ^1.2.8
  google_fonts: ^6.0.0

  # googleapis i googleapis_auth UKLONJENI - koristi se OSRM za optimizaciju ruta
  shimmer: ^3.0.0
  device_info_plus: ^10.0.0
  android_intent_plus: ^5.1.0
  # flutter_sms: ^2.3.3 # Problematičan namespace - zamijenjen sa url_launcher SMS pozivima
  # sms_advanced: ^1.0.1 # Alternativa sa automatskim slanjem - isto ima namespace problem
  # Vraćam se na URL launcher pristup - jedini koji radi
  # printing: ^5.14.2  # removed for Android-only build to avoid web dependency conflicts
  pdf: ^3.11.3
  geolocator: ^13.0.2
  # graphql: ^5.1.2  # UKLONJENO 2026-01-05 - nije korišćen
  # graphql_flutter: ^5.1.2  # UKLONJENO 2026-01-05 - nije korišćen
  uuid: ^4.4.0
  # supabase: ^2.10.0  # UKLONJENO 2026-01-05 - duplikat (već u supabase_flutter)
  
  # 🏗️ STATE MANAGEMENT & IMMUTABLE MODELS
  freezed_annotation: ^2.4.0
  json_annotation: ^4.8.1

  # 🗺️ OFFLINE MAPS DATABASE
  sqflite: ^2.4.1

  # 📇 CONTACT PICKER - biranje broja iz imenika
  flutter_contacts: ^1.1.9

  vibration: ^3.1.4
  
  # 🔐 BIOMETRIC AUTHENTICATION (otisak prsta, Face ID)
  local_auth: ^2.1.0
  huawei_push: ^6.14.0+300  # Huawei Push plugin - za notifikacije na Huawei uređajima

  # 🛰️ BACKGROUND GPS FOREGROUND SERVICE - GPS tracking dok je app u pozadini
  flutter_background_service: ^5.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.6
  freezed: ^2.4.0
  json_serializable: ^6.7.1
  flutter_launcher_icons: ^0.14.3

dependency_overrides:
  app_links: ^6.1.2
  geolocator_android: 4.6.1
  flutter_local_notifications: 17.2.3

# 🎨 LAUNCHER ICONS KONFIGURACIJA
flutter_launcher_icons:
  android: true
  ios: false  # iOS ćemo dodati kasnije
  image_path: "assets/logo_transparent.png"
  adaptive_icon_background: "#000000"  # Crna pozadina za adaptive icon
  adaptive_icon_foreground: "assets/logo_transparent.png"

flutter:
  uses-material-design: true

  assets:
    - .env # 🔐 Environment varijable (Supabase kredencijali)
    - assets/gavra.mp3
    - assets/kasno_je.mp3 # 🎵 GAVRA 013 pesma "Beogradski sindikat - Kasno je"
    - assets/bruda.mp3 # 🎵 Brudina specijalna pesma
    - assets/bilevski.mp3 # 🎵 Bilevskijeva specijalna pesma
    - assets/agconnect-services.json # 🗺️ Huawei Map Kit API config
    - assets/logo_gavra.jpg # 🎨 Logo firme Gavra 013
    - assets/logo_transparent.png # 🎨 Logo sa transparentnom pozadinom
    - assets/weather/ # 🌤️ Vremenske ikone
    - assets/tablica_066.png # 🚐 Tablice vozila
    - assets/tablica_088.png
    - assets/tablica_093.png
    - assets/tablica_097.png
    - assets/tablica_102.png
    - assets/fonts/Lato-Regular.ttf
    - assets/fonts/Lato-Bold.ttf

