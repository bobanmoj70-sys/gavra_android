workflows:
  android-workflow:
    name: Android - Google Play Alpha
    max_build_duration: 60
    instance_type: linux_x2

    environment:
      flutter: stable
      vars:
        PACKAGE_NAME: "com.gavra013.gavra_android"

    scripts:
      - name: Create .env file
        script: |
          echo "$ENV_FILE_CONTENT" > "$CM_BUILD_DIR/.env"

      - name: Create google-services.json
        script: |
          echo "$ANDROID_GOOGLE_SERVICES_JSON" | base64 --decode > "$CM_BUILD_DIR/android/app/google-services.json"

      - name: Set up keystore from CI secrets
        script: |
          echo "$ANDROID_KEYSTORE_B64" | base64 --decode > "$CM_BUILD_DIR/android/gavra-release-key-production.keystore"
          cat > "$CM_BUILD_DIR/android/key.properties" << EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeFile=../gavra-release-key-production.keystore
          EOF

      - name: Set up Google Play credentials
        script: |
          echo "$GOOGLE_PLAY_KEY_B64" | base64 --decode > "$CM_BUILD_DIR/google-play-key.json"

      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Build Android App Bundle
        script: |
          flutter build appbundle \
            --release \
            --obfuscate \
            --split-debug-info=build/android/outputs/mapping

    artifacts:
      - build/app/outputs/bundle/release/app-release.aab
      - build/android/outputs/mapping/**

    publishing:
      google_play:
        credentials: $CM_BUILD_DIR/google-play-key.json
        track: alpha
        submit_as_draft: false
        changes_not_sent_for_review: false
        metadata_path: distribution
      email:
        recipients:
          - bgavrilovic@gmail.com
        notify:
          success: true
          failure: true

  ios-workflow:
    name: iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic_ASC  # Ime App Store Connect API key-a koji ćeš dodati u Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gavra013.gavraAndroid
      flutter: stable
      vars:
        BUNDLE_ID: "com.gavra013.gavraAndroid"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Create .env file
        script: |
          cat > "$CM_BUILD_DIR/.env" << EOF
          $ENV_FILE_CONTENT
          EOF

      - name: Create GoogleService-Info.plist
        script: |
          echo "$IOS_GOOGLE_SERVICES_PLIST" > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"

      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Fix iOS deployment target
        script: |
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '15.0/g" ios/Podfile || true
          head -3 ios/Podfile

      - name: Install CocoaPods
        script: |
          export IPHONEOS_DEPLOYMENT_TARGET=15.0
          cd ios && pod install --repo-update

      - name: Set Xcode signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --obfuscate \
            --split-debug-info=build/ios/outputs/mapping

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/outputs/mapping/**
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      email:
        recipients:
          - bgavrilovic@gmail.com
        notify:
          success: true
          failure: true
