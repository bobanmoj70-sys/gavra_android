workflows:
  ios-workflow:
    name: iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic_ASC  # Ime App Store Connect API key-a koji ćeš dodati u Codemagic UI

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.gavra013.gavra013ios
      flutter: stable
      vars:
        BUNDLE_ID: "com.gavra013.gavra013ios"
        XCODE_SCHEME: "Runner"

    scripts:
      - name: Create .env file
        script: |
          cat > "$CM_BUILD_DIR/.env" << EOF
          $ENV_FILE_CONTENT
          EOF

      - name: Create GoogleService-Info.plist
        script: |
          echo "$IOS_GOOGLE_SERVICES_PLIST" > "$CM_BUILD_DIR/ios/Runner/GoogleService-Info.plist"

      - name: Get Flutter dependencies
        script: |
          flutter pub get

      - name: Fix iOS deployment target
        script: |
          sed -i '' "s/platform :ios, '[0-9.]*/platform :ios, '15.0/g" ios/Podfile || true
          head -3 ios/Podfile

      - name: Install CocoaPods
        script: |
          export IPHONEOS_DEPLOYMENT_TARGET=15.0
          cd ios && pod install --repo-update

      - name: Set Xcode signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --export-options-plist=ios/ExportOptions.plist \
            --obfuscate \
            --split-debug-info=build/ios/outputs/mapping

    artifacts:
      - build/ios/ipa/*.ipa
      - build/ios/outputs/mapping/**
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
      email:
        recipients:
          - bgavrilovic@gmail.com
        notify:
          success: true
          failure: true
